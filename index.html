<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marina & Elévia</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- PayPal JS SDK (Using Client ID) -->
    <script src="https://www.paypal.com/sdk/js?client-id=AYJ4VDgjnXPXTXGv4v5kHJ_96Z3m47mudvWC4UNBMfBdViaKhNwwUZ-eJZhpx6MjjOPZGYN0IafzfS8f&currency=USD"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #111827;
        }
        
        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-[#f8d7d7] relative">

    <!-- Header -->
    <header class="sticky top-0 bg-white/90 backdrop-blur-md border-b-[2px] border-[#D30000] z-40">
        <div class="max-w-6xl mx-auto px-4 h-24 flex items-center justify-between">
            
            <!-- Spacer on left to guarantee perfect center alignment on desktop -->
            <div class="flex-1 flex justify-start"></div>
            
            <h1 onclick="navigate('home')" class="text-2xl md:text-3xl font-serif tracking-widest uppercase cursor-pointer text-center flex-shrink-0 hover:opacity-80 transition-opacity">
                <span class="text-[#D30000]">M</span>arina & <span class="text-[#D30000]">E</span>lévia
            </h1>
            
            <!-- Cart Moved to Top Right inside square #E1B786 box -->
            <div class="flex-1 flex justify-end">
                <button onclick="navigate('cart')" class="w-10 h-10 bg-[#E1B786] flex items-center justify-center relative text-gray-900 hover:opacity-80 transition-opacity rounded-sm shadow-sm">
                    <i class="ph ph-shopping-cart text-xl"></i>
                    <span id="cart-badge" class="hidden absolute -top-2 -right-2 bg-[#D30000] text-white text-[10px] font-bold w-[20px] h-[20px] flex items-center justify-center rounded-full border-2 border-white">
                        0
                    </span>
                </button>
            </div>
            
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-content" class="flex-grow pb-32"></main>

    <!-- Custom Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 bg-[#D30000] text-white px-6 py-4 shadow-xl z-50 flex items-center gap-3 transition-opacity duration-300 opacity-0 pointer-events-none">
        <i class="ph ph-warning text-lg"></i>
        <span id="toast-msg" class="font-light tracking-wide text-sm"></span>
    </div>

    <!-- Sticky Cart Pill - Glassmorphism Transparent with White Outline -->
    <div id="cart-pill" onclick="proceedToCheckout()" class="cursor-pointer fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/40 backdrop-blur-lg border border-white/60 text-gray-900 rounded-full px-8 md:px-12 py-4 shadow-2xl z-40 flex items-center justify-between w-[90%] max-w-sm transition-all duration-500 translate-y-32 opacity-0 pointer-events-none hover:bg-white/60">
        <div class="flex items-center gap-3">
            <i class="ph ph-shopping-bag text-2xl text-[#D30000]"></i>
            <span id="cart-pill-text" class="text-base font-medium tracking-wide"></span>
        </div>
        <div class="text-sm tracking-widest uppercase font-semibold flex items-center gap-2 text-[#D30000]">
            Checkout <i class="ph ph-arrow-right text-lg"></i>
        </div>
    </div>

    <!-- Custom Modal -->
    <div id="modal" class="fixed inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300 opacity-0 pointer-events-none hidden">
        <div class="bg-white p-10 max-w-md w-full border border-gray-100 shadow-2xl text-center relative fade-in">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-[#D30000] transition-colors">
                <i class="ph ph-x text-xl"></i>
            </button>
            <div class="w-16 h-16 bg-[#D30000] text-white rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="ph ph-check text-3xl"></i>
            </div>
            <h3 class="text-2xl font-serif tracking-widest uppercase mb-4 text-gray-900">Order Confirmed</h3>
            <p id="modal-msg" class="text-gray-600 mb-8 font-light leading-relaxed"></p>
            <button onclick="closeModal()" class="bg-[#D30000] text-white uppercase tracking-widest text-xs font-semibold py-4 w-full hover:bg-[#a00000] transition-colors">
                Continue Shopping
            </button>
        </div>
    </div>

    <script>
        // --- MOCK PRODUCT DATA ---
        const PRODUCTS = [
            { id: 1, name: "Silk Crepe Blouse", price: 145.00, description: "A luxurious silk crepe blouse featuring delicate button detailing and a relaxed silhouette. Perfect for transitioning seamlessly from day to evening." },
            { id: 2, name: "Wide-Leg Trousers", price: 180.00, description: "High-waisted trousers tailored from premium wool-blend fabric. Features a flawless drape and subtle front pleats for an elegant stride." },
            { id: 3, name: "Cashmere Wrap Coat", price: 395.00, description: "An elegant wrap coat spun from pure, soft cashmere. Features a matching self-tie belt and oversized lapels for timeless sophistication." },
            { id: 4, name: "Leather Crossbody", price: 210.00, description: "Minimalist structured bag crafted from genuine Italian leather. Includes polished gold-tone hardware and an adjustable strap." },
            { id: 5, name: "Linen Midi Dress", price: 165.00, description: "Breathable linen dress perfect for warm, sun-drenched afternoons. Features a subtle V-neckline and a flowing, tiered skirt." },
            { id: 6, name: "Gold Hoop Earrings", price: 85.00, description: "Classic, lightweight hoops plated in thick 18k gold vermeil over sterling silver. Designed for comfortable, everyday wear." },
            { id: 7, name: "Suede Pointed Mules", price: 155.00, description: "Effortlessly chic mules with a soft suede finish and a sharp pointed toe. Includes a slight stacked heel for all-day comfort." },
            { id: 8, name: "Ribbed Knit Sweater", price: 125.00, description: "Cozy ribbed knit sweater with a relaxed, slouchy fit. Spun from a plush cotton-wool blend for unmatched softness." }
        ];

        // --- STATE ---
        let cart = [];
        let currentView = 'home';
        let selectedProductId = null;
        let toastTimeout;

        // --- CORE FUNCTIONS ---
        function navigate(view, productId = null) {
            currentView = view;
            if (productId) selectedProductId = productId;
            window.scrollTo(0, 0);
            updateCartUI(); // Hide/show pill based on view
            render();
        }

        function addToCart(productId, event) {
            if(event) event.stopPropagation();
            
            const product = PRODUCTS.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCartUI();
            render(); // Re-render to update the button colors instantly
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
            render();
        }

        function updateQuantity(productId, delta) {
            const item = cart.find(i => i.id === productId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    updateCartUI();
                    render();
                }
            }
        }

        function getCartTotal() {
            return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        }

        function getCartCount() {
            return cart.reduce((sum, item) => sum + item.quantity, 0);
        }

        function updateCartUI() {
            const count = getCartCount();
            const total = getCartTotal();
            
            // 1. Update Header Badge
            const badge = document.getElementById('cart-badge');
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }

            // 2. Update Sticky Pill
            const pill = document.getElementById('cart-pill');
            const pillText = document.getElementById('cart-pill-text');
            
            // Show pill only if there are items AND we are not already on the cart/checkout page
            if (count > 0 && currentView !== 'cart' && currentView !== 'checkout') {
                pillText.textContent = `${count} item${count !== 1 ? 's' : ''} • $${total.toFixed(2)}`;
                pill.classList.remove('translate-y-32', 'opacity-0', 'pointer-events-none');
            } else {
                pill.classList.add('translate-y-32', 'opacity-0', 'pointer-events-none');
            }
        }

        // --- BACKEND TRACKING ---
        function saveCheckoutData() {
            if (cart.length === 0) return;
            
            const customerName = document.getElementById('customerName')?.value || "";
            const email = document.getElementById('email')?.value || "";
            const address = document.getElementById('address')?.value || "";
            
            const productNames = cart.map(item => `${item.name} (x${item.quantity})`).join(', ');
            const orderInfo = {
                customerName: customerName,
                email: email,
                address: address,
                productName: productNames || "Website Order", 
                price: "$" + getCartTotal().toFixed(2)
            };

            // Connects precisely to the requested Live Render API endpoint
            fetch('https://my-store-backend-3cj5.onrender.com/api/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderInfo)
            }).catch(error => console.error("Database tracking failed:", error));
        }

        function proceedToCheckout() {
            saveCheckoutData(); // Sends finalized products to server immediately on button click
            navigate('checkout');
        }

        // --- UI UTILITIES ---
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = message;
            
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        function showModal(message) {
            const modal = document.getElementById('modal');
            document.getElementById('modal-msg').textContent = message;
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0', 'pointer-events-none');
                modal.classList.add('opacity-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                modal.classList.add('hidden');
                navigate('home');
            }, 300);
        }

        // --- RENDERING ---
        function render() {
            const content = document.getElementById('app-content');
            content.innerHTML = '';

            if (currentView === 'home') {
                content.innerHTML = renderHome();
            } else if (currentView === 'product') {
                content.innerHTML = renderProduct();
            } else if (currentView === 'cart') {
                content.innerHTML = renderCart();
            } else if (currentView === 'checkout') {
                content.innerHTML = renderCheckout();
                initPayPal(); 
            }
        }

        function renderHome() {
            let gridHtml = PRODUCTS.map(p => {
                const inCart = cart.find(item => item.id === p.id);
                
                // Dynamic styling: Solid red if in cart, transparent outline if not
                const btnClass = inCart 
                    ? "mt-auto w-full uppercase tracking-widest text-xs font-semibold py-3 border border-[#D30000] bg-[#D30000] text-white transition-all duration-300"
                    : "mt-auto w-full uppercase tracking-widest text-xs font-semibold py-3 border border-gray-300 text-gray-700 hover:bg-[#D30000] hover:text-white hover:border-[#D30000] transition-all duration-300";
                
                const btnText = inCart ? `In Cart (${inCart.quantity})` : "Add to Cart";

                return `
                    <div class="group cursor-pointer flex flex-col" onclick="navigate('product', ${p.id})">
                        <div class="aspect-[4/5] bg-[#F7F7F7] w-full mb-6 overflow-hidden flex items-center justify-center text-gray-300 transition-colors duration-500 group-hover:bg-[#EFEFEF]">
                            <span class="opacity-0 group-hover:opacity-100 transition-opacity duration-300 font-light tracking-widest text-xs uppercase text-gray-500">
                                View Details
                            </span>
                        </div>
                        <div class="flex flex-col items-center text-center flex-1">
                            <h3 class="text-sm md:text-base tracking-wider uppercase text-gray-900 mb-2 font-medium">${p.name}</h3>
                            <p class="text-gray-500 text-sm mb-6 font-light">$${p.price.toFixed(2)}</p>
                            <button onclick="addToCart(${p.id}, event)" class="${btnClass}">
                                ${btnText}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            // Added Responsive grid for desktop: md:grid-cols-3 lg:grid-cols-4
            return `
                <div class="max-w-6xl mx-auto px-4 py-12 fade-in">
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-6 gap-y-16 md:gap-x-8">
                        ${gridHtml}
                    </div>
                </div>
            `;
        }

        function renderProduct() {
            const p = PRODUCTS.find(item => item.id === selectedProductId);
            if (!p) return '';

            const inCart = cart.find(item => item.id === p.id);
            const btnClass = inCart 
                ? "bg-[#a00000] text-white uppercase tracking-widest text-sm font-semibold py-5 px-8 transition-colors duration-300 w-full mb-6"
                : "bg-[#D30000] text-white uppercase tracking-widest text-sm font-semibold py-5 px-8 hover:bg-[#a00000] transition-colors duration-300 w-full mb-6";
            
            const btnText = inCart ? `Add More (${inCart.quantity} In Cart)` : "Add to Cart";

            return `
                <div class="max-w-5xl mx-auto px-4 py-12 fade-in">
                    <button onclick="navigate('home')" class="flex items-center text-xs tracking-widest uppercase text-gray-500 hover:text-[#D30000] mb-12 transition-colors group">
                        <i class="ph ph-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i> 
                        Back to Collection
                    </button>
                    
                    <div class="flex flex-col md:flex-row gap-12 lg:gap-24">
                        <div class="flex-1">
                            <div class="w-full aspect-[3/4] bg-[#F7F7F7] flex items-center justify-center">
                               <span class="text-gray-400 font-light tracking-widest uppercase text-sm">Large Image Placeholder</span>
                            </div>
                        </div>
                        
                        <div class="flex-1 flex flex-col justify-center py-8">
                            <h2 class="text-3xl md:text-4xl font-serif uppercase tracking-widest mb-4 text-gray-900">${p.name}</h2>
                            <p class="text-2xl text-gray-600 mb-8 font-light">$${p.price.toFixed(2)}</p>
                            
                            <div class="w-12 h-[1px] bg-[#D30000] mb-8"></div>
                            
                            <p class="text-gray-600 leading-relaxed font-light mb-12 text-lg">${p.description}</p>
                            
                            <button onclick="addToCart(${p.id})" class="${btnClass}">
                                ${btnText}
                            </button>
                            
                            <div class="border-t border-gray-100 pt-6 mt-6">
                                <p class="text-xs text-gray-500 tracking-wider uppercase flex justify-between mb-2">
                                    <span>Shipping</span> <span>Complimentary</span>
                                </p>
                                <p class="text-xs text-gray-500 tracking-wider uppercase flex justify-between">
                                    <span>Returns</span> <span>Within 30 Days</span>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCart() {
            if (cart.length === 0) {
                return `
                    <div class="max-w-4xl mx-auto px-4 py-12 fade-in">
                        <button onclick="navigate('home')" class="flex items-center text-xs tracking-widest uppercase text-gray-500 hover:text-[#D30000] mb-8 transition-colors group">
                            <i class="ph ph-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i> 
                            Back to Products Section
                        </button>
                        <h2 class="text-3xl font-serif uppercase tracking-widest text-center mb-16">Your Cart</h2>
                        <div class="text-center py-20 bg-gray-50 border border-gray-100">
                            <p class="text-gray-500 mb-6 font-light text-lg">Your selected items will appear here.</p>
                            <button onclick="navigate('home')" class="text-[#D30000] uppercase tracking-widest text-sm border-b border-[#D30000] pb-1 hover:text-[#a00000] hover:border-[#a00000] transition-colors">
                                Continue Shopping
                            </button>
                        </div>
                    </div>
                `;
            }

            let cartHtml = cart.map(item => `
                <div class="py-8 flex items-center justify-between border-b border-gray-100 last:border-0">
                    <div class="flex items-center gap-4 md:gap-6">
                        <div class="w-16 h-24 md:w-20 md:h-28 bg-[#F7F7F7] flex items-center justify-center shrink-0 text-[10px] text-gray-400 uppercase tracking-widest text-center px-1">Img</div>
                        <div>
                            <h4 class="font-serif tracking-wider text-base md:text-lg mb-1">${item.name}</h4>
                            <p class="text-gray-500 text-sm font-light mb-3">$${item.price.toFixed(2)}</p>
                            
                            <!-- Quantity Controls -->
                            <div class="flex items-center gap-3">
                                <button onclick="updateQuantity(${item.id}, -1)" class="w-7 h-7 rounded-full border border-gray-300 flex items-center justify-center text-gray-500 hover:border-[#D30000] hover:text-[#D30000] transition-colors">-</button>
                                <span class="text-sm font-medium w-4 text-center">${item.quantity}</span>
                                <button onclick="updateQuantity(${item.id}, 1)" class="w-7 h-7 rounded-full border border-gray-300 flex items-center justify-center text-gray-500 hover:border-[#D30000] hover:text-[#D30000] transition-colors">+</button>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-4 md:gap-6">
                        <button onclick="removeFromCart(${item.id})" class="text-gray-400 hover:text-[#D30000] transition-colors" title="Remove item">
                            <i class="ph ph-trash text-lg"></i>
                        </button>
                        <p class="font-medium text-base md:text-lg">$${(item.price * item.quantity).toFixed(2)}</p>
                    </div>
                </div>
            `).join('');

            return `
                <div class="max-w-4xl mx-auto px-4 py-12 fade-in">
                    <button onclick="navigate('home')" class="flex items-center text-xs tracking-widest uppercase text-gray-500 hover:text-[#D30000] mb-8 transition-colors group">
                        <i class="ph ph-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i> 
                        Back to Products Section
                    </button>
                    <h2 class="text-3xl font-serif uppercase tracking-widest text-center mb-16">Your Cart</h2>
                    
                    <div class="border-t border-gray-100 mb-12">
                        ${cartHtml}
                    </div>
                    
                    <div class="flex flex-col items-end">
                        <div class="flex justify-between w-full md:w-1/2 mb-2 text-gray-500 text-sm">
                            <span class="uppercase tracking-widest">Subtotal</span>
                            <span>$${getCartTotal().toFixed(2)}</span>
                        </div>
                        <div class="flex justify-between w-full md:w-1/2 mb-8 text-gray-900 text-xl font-serif">
                            <span class="uppercase tracking-widest">Estimated Total</span>
                            <span>$${getCartTotal().toFixed(2)}</span>
                        </div>
                        <p class="text-xs text-gray-400 mb-8 tracking-widest uppercase text-right w-full">
                            Taxes and shipping calculated at checkout
                        </p>
                        
                        <button onclick="proceedToCheckout()" class="bg-[#D30000] text-white uppercase tracking-widest text-sm font-semibold py-5 px-12 hover:bg-[#a00000] transition-colors duration-300 w-full md:w-auto">
                            Proceed to Checkout
                        </button>
                    </div>
                </div>
            `;
        }

        function renderCheckout() {
            return `
                <div class="max-w-xl mx-auto py-12 px-4 fade-in">
                    <h2 class="text-3xl font-serif uppercase tracking-widest text-center mb-10 text-gray-900">Secure Checkout</h2>
                    
                    <div class="bg-gray-50 p-6 md:p-8 rounded-sm mb-8 border border-gray-100 shadow-sm">
                        <div class="flex justify-between mb-6 text-lg text-gray-800">
                            <span class="font-light tracking-wide">Total Amount</span>
                            <span class="font-semibold">$${getCartTotal().toFixed(2)} USD</span>
                        </div>
                        <div class="w-full h-[1px] bg-gray-200 mb-8"></div>
                        
                        <form id="checkout-form" class="space-y-5" onsubmit="event.preventDefault();">
                            <div>
                                <label class="block text-xs font-medium tracking-widest uppercase text-gray-700 mb-2">Full Name</label>
                                <input type="text" id="customerName" required onblur="saveCheckoutData()" class="w-full border border-gray-300 px-4 py-3 bg-white focus:outline-none focus:border-[#D30000] transition-colors" placeholder="Jane Doe">
                            </div>
                            <div>
                                <label class="block text-xs font-medium tracking-widest uppercase text-gray-700 mb-2">Email</label>
                                <input type="email" id="email" required onblur="saveCheckoutData()" class="w-full border border-gray-300 px-4 py-3 bg-white focus:outline-none focus:border-[#D30000] transition-colors" placeholder="jane@example.com">
                            </div>
                            <div>
                                <label class="block text-xs font-medium tracking-widest uppercase text-gray-700 mb-2">Shipping Address</label>
                                <textarea id="address" required rows="3" onblur="saveCheckoutData()" class="w-full border border-gray-300 px-4 py-3 bg-white focus:outline-none focus:border-[#D30000] transition-colors" placeholder="123 Luxury Lane..."></textarea>
                            </div>
                            
                            <div class="pt-4 relative z-0">
                                <div id="paypal-button-container" class="min-h-[55px]"></div>
                            </div>
                        </form>
                    </div>

                    <div class="text-center mt-6">
                        <button onclick="navigate('home')" class="text-sm tracking-widest uppercase text-gray-500 hover:text-[#D30000] transition-colors duration-300 border-b border-transparent hover:border-[#D30000] pb-1">
                            <i class="ph ph-arrow-left inline-block mr-1"></i> Back to Products Section
                        </button>
                    </div>
                </div>
            `;
        }

        function initPayPal() {
            const container = document.getElementById('paypal-button-container');
            if (!window.paypal) {
                container.innerHTML = '<p class="text-red-500 text-sm">Failed to load PayPal gateway. Check connection.</p>';
                return;
            }

            container.innerHTML = ''; 
            
            paypal.Buttons({
                style: { color: 'black', shape: 'rect', label: 'pay', height: 55 },
                onClick: function(data, actions) {
                    const form = document.getElementById('checkout-form');
                    if (!form.checkValidity()) {
                        form.reportValidity(); 
                        return actions.reject(); 
                    }
                    return actions.resolve(); 
                },
                createOrder: function(data, actions) {
                    saveCheckoutData(); // Ensure the absolute final typed data is sent right before payment processing

                    return actions.order.create({
                        purchase_units: [{
                            amount: { value: getCartTotal().toFixed(2) }
                        }]
                    });
                },
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        cart = []; 
                        updateCartUI();
                        const buyerName = details.payer.name.given_name;
                        showModal(`Thank you for your elegant purchase, ${buyerName}. Your order from Marina & Elévia has been successfully confirmed and processed securely.`);
                    });
                },
                onError: function(err) {
                    console.error("PayPal Error:", err);
                    showToast("Payment window closed or an error occurred.");
                }
            }).render('#paypal-button-container');
        }

        // Initialize App
        updateCartUI();
        render();
    </script>
</body>
</html>
