<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marina & Elévia</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- PayPal JS SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=AYgtpNcMYauLd1IW8nzAsfQw-sWG3mqR2-YbsqJDUvTHx6SaQjnXAj42lacA_t-qHa1SYklPM53tTY0P&currency=USD"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #111827;
        }
        
        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hide scrollbar */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        
        /* Floating Label overrides & Autofill cleanup */
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px white inset !important;
        }
        
        .snap-always { scroll-snap-stop: always; }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-[#f8d7d7] relative overflow-x-hidden">

    <!-- Header -->
    <header class="sticky top-0 bg-white/90 backdrop-blur-md border-b-[2px] border-[#D30000] z-40">
        <div class="max-w-6xl mx-auto px-4 h-24 flex items-center justify-between w-full gap-4">
            
            <h1 onclick="navigate('product')" class="text-xl md:text-2xl font-serif font-bold tracking-widest uppercase cursor-pointer flex-shrink-0 hover:opacity-80 transition-opacity">
                <span class="text-[#D30000]">M</span>arina & <span class="text-[#D30000]">E</span>lévia
            </h1>
            
            <div class="flex items-center justify-end gap-3 md:gap-5 border-l border-gray-200 pl-4 md:pl-8">
                <button onclick="handleHelpClick()" class="w-10 h-10 flex items-center justify-center relative text-gray-900 hover:text-[#D30000] transition-colors" title="Contact Support">
                    <i class="ph ph-headset text-2xl"></i>
                </button>
                
                <div class="flex-shrink-0">
                    <button id="cart-icon-btn" onclick="handleCartClick()" class="w-10 h-10 flex items-center justify-center relative text-gray-900 transition-colors">
                        <i id="cart-icon" class="ph ph-shopping-cart text-2xl transition-colors duration-200"></i>
                        <span id="cart-badge" class="hidden absolute -top-1 -right-1 bg-[#D30000] text-white text-[10px] font-bold w-[18px] h-[18px] flex items-center justify-center rounded-full">
                            0
                        </span>
                    </button>
                </div>
            </div>
            
        </div>
    </header>

    <!-- Top Notification -->
    <div id="top-notification" class="fixed top-8 left-1/2 -translate-x-1/2 bg-green-600 text-white px-8 py-5 rounded-full shadow-2xl z-[100] flex items-center gap-4 transition-all duration-500 -translate-y-40 opacity-0 pointer-events-none w-max max-w-[95%] md:max-w-md">
        <div class="w-8 h-8 bg-white text-green-600 rounded-full flex items-center justify-center shrink-0">
            <i class="ph ph-check font-bold text-lg"></i>
        </div>
        <div class="flex flex-col">
            <span id="top-notification-msg" class="font-medium text-base md:text-lg tracking-wide"></span>
            <span class="text-xs uppercase tracking-widest opacity-90 mt-0.5">Redirecting...</span>
        </div>
    </div>

    <!-- FOMO Notification Popup -->
    <div id="fomo-popup" class="fixed bottom-24 left-4 md:left-6 z-50 bg-white/95 backdrop-blur shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-gray-100 rounded-full p-1.5 pr-5 flex items-center gap-3 transition-all duration-700 translate-y-40 opacity-0 pointer-events-none max-w-[90%] md:max-w-sm">
        <div class="w-10 h-10 rounded-full bg-gray-50 border border-gray-100 flex items-center justify-center shrink-0 overflow-hidden">
            <i class="ph ph-bag text-xl text-gray-400"></i>
        </div>
        <div class="flex flex-col py-1">
            <div class="flex items-center gap-2 mb-0.5">
                <span id="fomo-name" class="text-[11px] font-semibold text-gray-900"></span>
                <span class="text-[9px] text-gray-400 font-medium">just now</span>
            </div>
            <span id="fomo-action" class="text-[10px] text-gray-600 leading-tight line-clamp-1"></span>
            <div class="flex items-center gap-1 mt-1">
                <i class="ph-fill ph-check-circle text-green-500 text-[10px]"></i>
                <span class="text-[8px] text-green-600 uppercase tracking-widest font-bold">Verified by system</span>
            </div>
        </div>
        <div class="ml-auto pl-3 border-l border-gray-100 flex items-center h-full">
            <span id="fomo-price" class="text-sm font-serif font-medium text-[#D30000]"></span>
        </div>
    </div>

    <!-- Main Content Area -->
    <main id="app-content" class="flex-grow pb-32"></main>

    <!-- Custom Modal -->
    <div id="modal" class="fixed inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300 opacity-0 pointer-events-none hidden">
        <div class="bg-white p-10 max-w-md w-full border border-gray-100 shadow-2xl text-center relative fade-in">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-[#D30000] transition-colors">
                <i class="ph ph-x text-xl"></i>
            </button>
            <div class="w-16 h-16 bg-[#D30000] text-white rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="ph ph-check text-3xl"></i>
            </div>
            <h3 class="text-2xl font-serif tracking-widest uppercase mb-4 text-gray-900">Order Confirmed</h3>
            <p id="modal-msg" class="text-gray-600 mb-8 font-light leading-relaxed"></p>
            <button onclick="closeModal()" class="bg-[#D30000] text-white uppercase tracking-widest text-xs font-semibold py-4 w-full hover:bg-[#a00000] transition-colors">
                Return to Product
            </button>
        </div>
    </div>

    <!-- Crypto Payment Modal -->
    <div id="crypto-modal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[70] p-4 transition-opacity duration-300 opacity-0 pointer-events-none hidden">
        <div class="bg-white max-w-sm w-full rounded-md shadow-2xl relative fade-in overflow-hidden">
            <div class="p-6 border-b border-gray-100">
                <button onclick="closeCryptoPopup()" class="absolute top-6 right-6 text-gray-400 hover:text-[#D30000] transition-colors">
                    <i class="ph ph-x text-xl"></i>
                </button>
                <h3 class="text-lg font-serif tracking-widest uppercase text-gray-900">Select Network & Token</h3>
            </div>
            <div id="crypto-modal-content" class="p-6">
                <!-- Rendered dynamically via JS -->
            </div>
        </div>
    </div>

    <!-- Support Redirect Loading Overlay -->
    <div id="help-overlay" class="fixed inset-0 bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center z-[60] transition-opacity duration-300 opacity-0 pointer-events-none hidden">
        <i class="ph ph-spinner animate-spin text-[40px] text-[#D30000] mb-6"></i>
        <h3 class="text-2xl font-serif tracking-widest uppercase mb-3 text-gray-900">Redirecting you to us...</h3>
        <p class="text-xs text-gray-500 tracking-widest uppercase">Opening your secure email client</p>
    </div>

    <!-- Solid White Sticky Cart Bar -->
    <div id="cart-pill" class="fixed bottom-0 left-0 w-full bg-white text-gray-900 border-t border-gray-200 shadow-[0_-4px_20px_rgba(0,0,0,0.06)] px-6 md:px-12 py-4 z-40 flex items-center justify-between transition-transform duration-500 translate-y-full">
        <div class="flex items-center gap-3">
            <i class="ph ph-shopping-bag text-2xl text-[#D30000]"></i>
            <span id="cart-pill-text" class="text-sm md:text-base font-medium tracking-wide"></span>
        </div>
        <button onclick="navigate('cart')" class="text-xs md:text-sm tracking-widest uppercase font-semibold flex items-center gap-2 text-white bg-[#D30000] px-6 py-3 hover:bg-[#a00000] transition-colors shadow-md">
            View in Cart <i class="ph ph-arrow-right text-lg"></i>
        </button>
    </div>

    <!-- Custom Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 bg-[#D30000] text-white px-6 py-4 shadow-xl z-50 flex items-center gap-3 transition-opacity duration-300 opacity-0 pointer-events-none">
        <i class="ph ph-warning text-lg"></i>
        <span id="toast-msg" class="font-light tracking-wide text-sm"></span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyD4qy5YuvvNyghccthEOm-D3DaCgB3LNbk",
          authDomain: "form-info-221b0.firebaseapp.com",
          projectId: "form-info-221b0",
          storageBucket: "form-info-221b0.firebasestorage.app",
          messagingSenderId: "640135037047",
          appId: "1:640135037047:web:26762e57d31e8c46c98672"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- AUDIO INTEGRATION ---
        const cartAudio = new Audio('AUD-20260422-WA0000.mp3');

        function playCartSound() {
            cartAudio.currentTime = 0;
            cartAudio.play().catch(e => console.warn("Audio play prevented by browser:", e));
        }

        // --- STREAMING_CHUNK:Setting up Product Data and Config... ---
        // Isolated to a single product for the landing page experience
        const PRODUCTS = [
            { 
                id: 1, 
                name: "Silk Crepe Blouse", 
                price: 145.00, 
                originalPrice: 180.00, 
                rating: 4.9, 
                reviews: 342, 
                description: "A luxurious silk crepe blouse featuring delicate button detailing and a relaxed silhouette. Perfect for transitioning seamlessly from day to evening.", 
                reviewsList: [
                    { author: "Eleanor V.", rating: 5, text: "Absolutely stunning! The silk is of the highest quality and it drapes beautifully. A wardrobe staple." }, 
                    { author: "Sarah M.", rating: 5, text: "I've worn this to work and to dinner dates. Extremely versatile and feels luxurious against the skin." }, 
                    { author: "Jessica T.", rating: 4, text: "Beautiful blouse. The button detailing adds such a chic touch. Looks far more expensive than it is." }, 
                    { author: "Amanda C.", rating: 5, text: "Fits perfectly. I get compliments every time I wear it. I want it in every color." }, 
                    { author: "Chloe R.", rating: 5, text: "Worth every penny. The craftsmanship is flawless, no loose threads anywhere." }
                ] 
            }
        ];

        const FAKE_NAMES = ['Emma W.', 'Sophia L.', 'James B.', 'Olivia M.', 'William K.', 'Ava C.', 'Isabella R.', 'Mia T.', 'Charlotte H.', 'Amelia S.', 'Benjamin D.', 'Elijah P.'];

        const CRYPTO_ASSETS = {
            'Ethereum': {
                address: '0x6Fc3681E7b082278dDab90686f048B04117C332c',
                tokens: {
                    'USDT': './eth-usdt.jpg',
                    'USDC': './ethereum-usdc.jpg',
                    'ETH': './ethereum-eth.png'
                }
            },
            'Solana': {
                address: 'CkgnzdUT8R16o2ZMEZa9swjT727PvR5swNRK47ADtCy',
                tokens: {
                    'USDT': './solana-usdt.jpg',
                    'USDC': './solana-usdc.jpg',
                    'SOL': './Solana-sol.jpg'
                }
            }
        };

        // --- STATE ---
        let cart = [];
        let currentView = 'product'; // Changed default view to Product
        let selectedProductId = 1; // Default to the only product
        let toastTimeout;
        let finalCustomerEmail = '';
        
        let cryptoNetwork = 'Ethereum';
        let cryptoToken = 'ETH';
        window.currentCryptoAmount = 0;
        const CRYPTO_RATES = { 'ETH': 3100, 'SOL': 140, 'USDT': 1, 'USDC': 1 };

        window.addEventListener('resize', () => { updateCartUI(); });

        // --- STREAMING_CHUNK:Defining core interactivity functions... ---
        function navigate(view, productId = null) {
            currentView = view;
            if (productId) selectedProductId = productId;
            window.scrollTo(0, 0);
            updateCartUI(); 
            render();
        }

        function handleHelpClick() {
            const overlay = document.getElementById('help-overlay');
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0', 'pointer-events-none');
                overlay.classList.add('opacity-100', 'pointer-events-auto');
            }, 10);
            setTimeout(() => {
                window.location.href = "mailto:marina.elevia@gmail.com";
                overlay.classList.remove('opacity-100', 'pointer-events-auto');
                overlay.classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => { overlay.classList.add('hidden'); }, 300);
            }, 3000);
        }

        function handleCartClick() {
            const icon = document.getElementById('cart-icon');
            icon.classList.remove('ph');
            icon.classList.add('ph-fill', 'text-[#D30000]');
            setTimeout(() => {
                icon.classList.remove('ph-fill', 'text-[#D30000]');
                icon.classList.add('ph');
                navigate('cart');
            }, 150);
        }

        // New Direct Buy Now Logic
        function buyNow(productId, event) {
            if(event) event.stopPropagation();
            const product = PRODUCTS.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            
            if (!existing) {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCartUI();
            navigate('checkout');
        }

        function addToCart(productId, event) {
            if(event) event.stopPropagation();
            playCartSound(); 
            
            const product = PRODUCTS.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCartUI();
            updateAllButtons();
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
            updateAllButtons();
        }

        function updateQuantity(productId, delta, event) {
            if(event) event.stopPropagation();
            if (delta > 0) playCartSound(); 
            
            const item = cart.find(i => i.id === productId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    updateCartUI();
                    updateAllButtons();
                }
            }
        }

        function updateAllButtons() {
            if (currentView === 'cart') {
                render(); 
                return;
            }
            
            if (currentView === 'product') {
                const btnContainer = document.getElementById(`btn-container-${selectedProductId}`);
                const p = PRODUCTS.find(item => item.id === selectedProductId);
                if (btnContainer && p) {
                    btnContainer.innerHTML = getButtonHTML(p, 'large');
                }
            }
        }

        function getButtonHTML(p, size = 'normal') {
            const inCart = cart.find(item => item.id === p.id);
            const heightClass = size === 'large' ? 'h-[58px] text-sm' : 'h-[42px] text-xs';
            
            if (inCart) {
                return `
                    <div class="mt-3 w-full flex items-center justify-between border border-[#D30000] bg-[#D30000] text-white transition-all duration-300 shadow-md ${heightClass}">
                        <button onclick="updateQuantity(${p.id}, -1, event)" class="w-14 h-full hover:bg-[#a00000] flex items-center justify-center transition-colors">
                            <i class="ph ph-minus font-bold"></i>
                        </button>
                        <span class="font-semibold tracking-widest select-none">${inCart.quantity} IN CART</span>
                        <button onclick="updateQuantity(${p.id}, 1, event)" class="w-14 h-full hover:bg-[#a00000] flex items-center justify-center transition-colors">
                            <i class="ph ph-plus font-bold"></i>
                        </button>
                    </div>
                `;
            } else {
                return `
                    <button onclick="addToCart(${p.id}, event)" class="mt-3 w-full ${heightClass} uppercase tracking-widest font-semibold border-2 border-gray-900 text-gray-900 hover:bg-gray-900 hover:text-white transition-all duration-300">
                        Add to Cart
                    </button>
                `;
            }
        }

        function getCartTotal() {
            return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        }

        function getCartCount() {
            return cart.reduce((sum, item) => sum + item.quantity, 0);
        }
        
        function getCartOriginalTotal() {
            return cart.reduce((sum, item) => sum + (item.originalPrice * item.quantity), 0);
        }

        function updateCartUI() {
            const count = getCartCount();
            const total = getCartTotal();
            
            const badge = document.getElementById('cart-badge');
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }

            const pill = document.getElementById('cart-pill');
            const pillText = document.getElementById('cart-pill-text');
            
            if (count > 0 && currentView !== 'cart' && currentView !== 'checkout' && currentView !== 'thankyou' && currentView !== 'crypto-payment') {
                if (currentView === 'product' && window.innerWidth >= 1024) {
                    pill.classList.add('translate-y-full');
                } else {
                    pillText.textContent = `${count} ITEM${count !== 1 ? 'S' : ''}  |  $${total.toFixed(2)}`;
                    pill.classList.remove('translate-y-full');
                }
            } else {
                pill.classList.add('translate-y-full');
            }
        }

        function proceedToCheckout() {
            navigate('checkout');
        }

        // --- STREAMING_CHUNK:Image Slider Logic... ---
        function scrollSlider(direction) {
            const slider = document.getElementById('product-slider');
            const width = slider.clientWidth;
            const maxIndex = 2; // 3 images
            
            let currentIndex = Math.round(slider.scrollLeft / width);
            let nextIndex = currentIndex + direction;
            
            if (nextIndex > maxIndex) nextIndex = 0;
            if (nextIndex < 0) nextIndex = maxIndex;
            
            slider.scrollTo({ left: nextIndex * width, behavior: 'smooth' });
        }

        function updateSliderDots(slider) {
            const width = slider.clientWidth;
            if (width === 0) return;
            const index = Math.round(slider.scrollLeft / width);
            document.querySelectorAll('.slider-dot').forEach((dot, i) => {
                dot.classList.toggle('bg-[#D30000]', i === index);
                dot.classList.toggle('bg-gray-300', i !== index);
            });
        }

        // --- STREAMING_CHUNK:FOMO Notification Logic... ---
        let fomoHideTimeout;
        function triggerFOMO() {
            if (currentView !== 'product') return;
            
            const popup = document.getElementById('fomo-popup');
            if (!popup) return;
            
            const randomName = FAKE_NAMES[Math.floor(Math.random() * FAKE_NAMES.length)];
            const product = PRODUCTS[0];
            const randomQty = Math.floor(Math.random() * 2) + 1; 
            const priceStr = "$" + (product.price * randomQty).toFixed(2);
            
            document.getElementById('fomo-name').textContent = randomName;
            document.getElementById('fomo-action').textContent = `bought ${randomQty > 1 ? randomQty + 'x ' : ''}${product.name}`;
            document.getElementById('fomo-price').textContent = priceStr;
            
            popup.classList.remove('translate-y-40', 'opacity-0');
            popup.classList.add('translate-y-0', 'opacity-100');
            
            if (fomoHideTimeout) clearTimeout(fomoHideTimeout);
            
            fomoHideTimeout = setTimeout(() => {
                popup.classList.remove('translate-y-0', 'opacity-100');
                popup.classList.add('translate-y-40', 'opacity-0');
            }, 3000); 
        }

        let fomoCount = 0;
        function scheduleFOMO() {
            let delay;
            if (fomoCount === 0) delay = 1000;       
            else if (fomoCount === 1) delay = 3500;  
            else if (fomoCount === 2) delay = 4000;  
            else if (fomoCount === 3) delay = 4500;  
            else {
                delay = Math.floor(Math.random() * 2000) + 5500;
            }
            
            setTimeout(() => {
                triggerFOMO();
                fomoCount++;
                scheduleFOMO();
            }, delay);
        }

        scheduleFOMO();

        // --- STREAMING_CHUNK:Crypto Logic... ---
        function openCryptoPopup() {
            cryptoNetwork = 'Ethereum';
            cryptoToken = 'ETH';
            
            const modal = document.getElementById('crypto-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0', 'pointer-events-none');
                modal.classList.add('opacity-100');
            }, 10);
            
            renderCryptoModal();
        }

        function closeCryptoPopup() {
            const modal = document.getElementById('crypto-modal');
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function setCryptoNetwork(network) {
            cryptoNetwork = network;
            cryptoToken = network === 'Ethereum' ? 'ETH' : 'SOL';
            renderCryptoModal();
        }

        function setCryptoToken(token) {
            cryptoToken = token;
            renderCryptoModal();
        }

        function renderCryptoModal() {
            const container = document.getElementById('crypto-modal-content');
            if (!container) return;

            const totalDueFiat = getCartTotal();
            const exchangeRate = CRYPTO_RATES[cryptoToken] || 1;
            const cryptoAmountRaw = (totalDueFiat / exchangeRate).toFixed(cryptoToken.includes('USD') ? 2 : 4);
            
            window.currentCryptoAmount = cryptoAmountRaw;

            const tokens = cryptoNetwork === 'Ethereum'  
                ? ['USDT', 'USDC', 'ETH']  
                : ['USDT', 'USDC', 'SOL'];

            container.innerHTML = `
                <!-- Network Selection Tabs -->
                <div class="flex gap-2 p-1 bg-gray-100 rounded-sm mb-6">
                    <button onclick="setCryptoNetwork('Ethereum')" class="flex-1 py-2 text-[10px] font-semibold tracking-widest uppercase transition-colors ${cryptoNetwork === 'Ethereum' ? 'bg-white shadow-sm text-black' : 'text-gray-500 hover:text-black'}">Ethereum</button>
                    <button onclick="setCryptoNetwork('Solana')" class="flex-1 py-2 text-[10px] font-semibold tracking-widest uppercase transition-colors ${cryptoNetwork === 'Solana' ? 'bg-white shadow-sm text-black' : 'text-gray-500 hover:text-black'}">Solana</button>
                </div>

                <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-3">Select Token</p>
                
                <!-- Token List -->
                <div class="space-y-2 mb-8">
                    ${tokens.map(token => `
                        <div onclick="setCryptoToken('${token}')" class="flex items-center justify-between p-4 border ${cryptoToken === token ? 'border-[#D30000] bg-red-50/50' : 'border-gray-200 hover:border-gray-300'} cursor-pointer transition-colors rounded-sm">
                            <div class="flex items-center gap-3">
                                <i class="ph ph-coin text-xl ${cryptoToken === token ? 'text-[#D30000]' : 'text-gray-400'}"></i>
                                <span class="font-medium text-gray-900">${token} <span class="text-gray-400 text-xs font-light ml-1">(${cryptoNetwork})</span></span>
                            </div>
                            ${cryptoToken === token ? '<i class="ph-fill ph-check-circle text-[#D30000] text-lg"></i>' : ''}
                        </div>
                    `).join('')}
                </div>

                <!-- Total Amount Summary -->
                <div class="flex justify-between items-end mb-6 pt-4 border-t border-gray-100">
                    <span class="text-[10px] uppercase tracking-widest text-gray-500 font-semibold">Total Due</span>
                    <div class="text-right">

        function handleCheckoutInfoSubmit(event) {
            event.preventDefault();
            const form = document.getElementById('checkout-info-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            
            finalCustomerEmail = document.getElementById('email').value;
            const customerName = document.getElementById('customerName').value;
            const address = document.getElementById('address').value;

            // Show top green notification
            const topNotif = document.getElementById('top-notification');
            document.getElementById('top-notification-msg').textContent = `Info secured, ${customerName}`;
            
            topNotif.classList.remove('-translate-y-40', 'opacity-0', 'pointer-events-none');
            topNotif.classList.add('translate-y-0', 'opacity-100');

            // Animate Button
            const btn = document.getElementById('next-btn');
            btn.innerHTML = `<i class="ph ph-spinner animate-spin text-2xl"></i>`;
            
            // Collect order payload for Firebase
            const orderData = {
                customerDetails: {
                    name: customerName,
                    email: finalCustomerEmail,
                    address: address
                },
                cart: cart.map(item => ({
                    id: item.id,
                    name: item.name,
                    price: item.price,
                    quantity: item.quantity
                })),
                totalPrice: getCartTotal(),
                createdAt: serverTimestamp()
            };

            // Fire and forget Firebase save
            addDoc(collection(db, "delivery_orders"), orderData)
                .then(() => console.log("Order saved to secure Firebase."))
                .catch(error => console.error("Firebase Database error:", error));
            
            setTimeout(() => {
                // Hide top notification
                topNotif.classList.remove('translate-y-0', 'opacity-100');
                topNotif.classList.add('-translate-y-40', 'opacity-0', 'pointer-events-none');
                
                // Swap views
                document.getElementById('info-step').classList.add('hidden');
                document.getElementById('info-back').classList.add('hidden');
                
                const waitingHeader = document.getElementById('checkout-waiting-header');
                waitingHeader.classList.remove('hidden');
                waitingHeader.classList.add('flex');
                
                document.getElementById('payment-step').classList.remove('hidden');
                document.getElementById('payment-back').classList.remove('hidden');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
                initPayPal();
            }, 1800);
        }

        function copyText(text, label) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {

                showToast(label + " copied to clipboard!");

            document.body.removeChild(textArea);

        }

        function initPayPal() {
            const container = document.getElementById('paypal-button-container');
            if (!window.paypal) {
                container.innerHTML = '<p class="text-[#D30000] text-sm text-center py-4">Failed to load secure gateway. Please refresh.</p>';
                return;
            }

            container.innerHTML = ''; 
            
            paypal.Buttons({
                style: { color: 'black', shape: 'rect', label: 'pay', height: 55 },
                onClick: function(data, actions) {
                    // Validation handled before this step now
                    document.getElementById('paypal-ui-container').classList.add('hidden');
                    return actions.resolve(); 
                },
                onCancel: function (data) {
                    document.getElementById('paypal-ui-container').classList.remove('hidden');
                },
                createOrder: function(data, actions) {
                    return actions.order.create({
                        purchase_units: [{
                            amount: { value: getCartTotal().toFixed(2) }
                        }]
                    });
                },
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        cart = []; 
                        updateCartUI();
                        updateAllButtons();
                        navigate('thankyou');
                    });
                },
                onError: function(err) {
                    console.error("PayPal Error:", err);
                    document.getElementById('paypal-ui-container').classList.remove('hidden');
                    showToast("Payment window closed or an error occurred.");
                }
            }).render('#paypal-button-container');
        }

        // --- BIND GLOBALS FOR MODULE SCRIPT ---
        window.navigate = navigate;
        window.handleHelpClick = handleHelpClick;
        window.handleCartClick = handleCartClick;
        window.buyNow = buyNow;
        window.addToCart = addToCart;
        window.removeFromCart = removeFromCart;
        window.updateQuantity = updateQuantity;
        window.proceedToCheckout = proceedToCheckout;
        window.scrollSlider = scrollSlider;
        window.updateSliderDots = updateSliderDots;
        window.handleCheckoutInfoSubmit = handleCheckoutInfoSubmit;
        window.goBackToInfo = goBackToInfo;
        window.closeModal = closeModal;
        window.openCryptoPopup = openCryptoPopup;
        window.closeCryptoPopup = closeCryptoPopup;
        window.setCryptoNetwork = setCryptoNetwork;
        window.setCryptoToken = setCryptoToken;
        window.processCryptoPayment = processCryptoPayment;
        window.copyText = copyText;

        // Initialize App
        updateCartUI();
        render();
    </script>
</body>
</html>
