<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marina & Elévia</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- PayPal JS SDK (Using Client ID) -->
    <script src="https://www.paypal.com/sdk/js?client-id=AYgtpNcMYauLd1IW8nzAsfQw-sWG3mqR2-YbsqJDUvTHx6SaQjnXAj42lacA_t-qHa1SYklPM53tTY0P&currency=USD"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #111827;
        }
        
        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hide scrollbar for cleaner look */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        
        /* Form Autofill cleanup */
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px white inset !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-[#f8d7d7] relative overflow-x-hidden">

    <!-- Header -->
    <header class="sticky top-0 bg-white/90 backdrop-blur-md border-b-[2px] border-[#D30000] z-40">
        <div class="max-w-6xl mx-auto px-4 h-24 flex items-center justify-between">
            
            <!-- Logo adjusted to the left -->
            <h1 onclick="navigate('home')" class="text-2xl md:text-3xl font-serif tracking-widest uppercase cursor-pointer flex-shrink-0 hover:opacity-80 transition-opacity">
                <span class="text-[#D30000]">M</span>arina & <span class="text-[#D30000]">E</span>lévia
            </h1>
            
            <!-- Clean Cart Icon (No square background, animates fill on click) -->
            <div class="flex-shrink-0">
                <button id="cart-icon-btn" onclick="handleCartClick()" class="w-10 h-10 flex items-center justify-center relative text-gray-900 transition-colors">
                    <i id="cart-icon" class="ph ph-shopping-cart text-2xl transition-colors duration-200"></i>
                    <span id="cart-badge" class="hidden absolute -top-1 -right-1 bg-[#D30000] text-white text-[10px] font-bold w-[18px] h-[18px] flex items-center justify-center rounded-full">
                        0
                    </span>
                </button>
            </div>
            
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-content" class="flex-grow pb-32"></main>

    <!-- Custom Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 bg-[#D30000] text-white px-6 py-4 shadow-xl z-50 flex items-center gap-3 transition-opacity duration-300 opacity-0 pointer-events-none">
        <i class="ph ph-warning text-lg"></i>
        <span id="toast-msg" class="font-light tracking-wide text-sm"></span>
    </div>

    <!-- Solid White Sticky Cart Bar (Full Width, No Rounding, No Glassmorphism) -->
    <div id="cart-pill" class="fixed bottom-0 left-0 w-full bg-white text-gray-900 border-t border-gray-200 shadow-[0_-4px_20px_rgba(0,0,0,0.06)] px-6 md:px-12 py-4 z-40 flex items-center justify-between transition-transform duration-500 translate-y-full">
        <div class="flex items-center gap-3">
            <i class="ph ph-shopping-bag text-2xl text-[#D30000]"></i>
            <span id="cart-pill-text" class="text-sm md:text-base font-medium tracking-wide"></span>
        </div>
        <button onclick="proceedToCheckout()" class="text-xs md:text-sm tracking-widest uppercase font-semibold flex items-center gap-2 text-white bg-[#D30000] px-6 py-3 hover:bg-[#a00000] transition-colors shadow-md">
            Checkout <i class="ph ph-arrow-right text-lg"></i>
        </button>
    </div>

    <!-- Custom Modal -->
    <div id="modal" class="fixed inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300 opacity-0 pointer-events-none hidden">
        <div class="bg-white p-10 max-w-md w-full border border-gray-100 shadow-2xl text-center relative fade-in">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-[#D30000] transition-colors">
                <i class="ph ph-x text-xl"></i>
            </button>
            <div class="w-16 h-16 bg-[#D30000] text-white rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="ph ph-check text-3xl"></i>
            </div>
            <h3 class="text-2xl font-serif tracking-widest uppercase mb-4 text-gray-900">Order Confirmed</h3>
            <p id="modal-msg" class="text-gray-600 mb-8 font-light leading-relaxed"></p>
            <button onclick="closeModal()" class="bg-[#D30000] text-white uppercase tracking-widest text-xs font-semibold py-4 w-full hover:bg-[#a00000] transition-colors">
                Continue Shopping
            </button>
        </div>
    </div>

    <script>
        // --- MOCK PRODUCT DATA (Enhanced with Badges & Urgency/FOMO Stats) ---
        const PRODUCTS = [
            { id: 1, name: "Silk Crepe Blouse", price: 145.00, badge: "TRENDING", sold: 940, left: 2, description: "A luxurious silk crepe blouse featuring delicate button detailing and a relaxed silhouette. Perfect for transitioning seamlessly from day to evening." },
            { id: 2, name: "Wide-Leg Trousers", price: 180.00, badge: "HOT", sold: 1250, left: 4, description: "High-waisted trousers tailored from premium wool-blend fabric. Features a flawless drape and subtle front pleats for an elegant stride." },
            { id: 3, name: "Cashmere Wrap Coat", price: 395.00, badge: null, sold: 410, left: 3, description: "An elegant wrap coat spun from pure, soft cashmere. Features a matching self-tie belt and oversized lapels for timeless sophistication." },
            { id: 4, name: "Leather Crossbody", price: 210.00, badge: null, sold: 865, left: 1, description: "Minimalist structured bag crafted from genuine Italian leather. Includes polished gold-tone hardware and an adjustable strap." },
            { id: 5, name: "Linen Midi Dress", price: 165.00, badge: null, sold: 620, left: 5, description: "Breathable linen dress perfect for warm, sun-drenched afternoons. Features a subtle V-neckline and a flowing, tiered skirt." },
            { id: 6, name: "Gold Hoop Earrings", price: 85.00, badge: null, sold: 1800, left: 6, description: "Classic, lightweight hoops plated in thick 18k gold vermeil over sterling silver. Designed for comfortable, everyday wear." },
            { id: 7, name: "Suede Pointed Mules", price: 155.00, badge: null, sold: 530, left: 2, description: "Effortlessly chic mules with a soft suede finish and a sharp pointed toe. Includes a slight stacked heel for all-day comfort." },
            { id: 8, name: "Ribbed Knit Sweater", price: 125.00, badge: null, sold: 790, left: 3, description: "Cozy ribbed knit sweater with a relaxed, slouchy fit. Spun from a plush cotton-wool blend for unmatched softness." }
        ];

        // --- STATE ---
        let cart = [];
        let currentView = 'home';
        let selectedProductId = null;
        let toastTimeout;

        // Ensure resizing window properly evaluates large-screen cart logic
        window.addEventListener('resize', () => { updateCartUI(); });

        // --- CORE FUNCTIONS ---
        function navigate(view, productId = null) {
            currentView = view;
            if (productId) selectedProductId = productId;
            window.scrollTo(0, 0);
            updateCartUI(); 
            render();
        }

        function handleCartClick() {
            const icon = document.getElementById('cart-icon');
            // Animate fill logic
            icon.classList.remove('ph');
            icon.classList.add('ph-fill', 'text-[#D30000]');
            setTimeout(() => {
                icon.classList.remove('ph-fill', 'text-[#D30000]');
                icon.classList.add('ph');
                navigate('cart');
            }, 150);
        }

        function addToCart(productId, event) {
            if(event) event.stopPropagation();
            
            const product = PRODUCTS.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCartUI();
            updateAllButtons(); // Updates DOM dynamically without fading page
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
            updateAllButtons();
        }

        function updateQuantity(productId, delta, event) {
            if(event) event.stopPropagation();
            const item = cart.find(i => i.id === productId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    updateCartUI();
                    updateAllButtons();
                }
            }
        }

        // Dynamically updates all add-to-cart buttons on the page to prevent re-render animation
        function updateAllButtons() {
            if (currentView === 'cart') {
                render(); // Cart view requires full list re-render
                return;
            }
            
            PRODUCTS.forEach(p => {
                const btnContainer = document.getElementById(`btn-container-${p.id}`);
                if (btnContainer) {
                    btnContainer.innerHTML = getButtonHTML(p);
                }
            });
        }

        function getButtonHTML(p) {
            const inCart = cart.find(item => item.id === p.id);
            if (inCart) {
                // Completely Red Solid Button state with Minus and Plus controls
                return `
                    <div class="mt-4 w-full flex items-center justify-between border border-[#D30000] bg-[#D30000] text-white transition-all duration-300 shadow-md h-[42px]">
                        <button onclick="updateQuantity(${p.id}, -1, event)" class="w-12 h-full hover:bg-[#a00000] flex items-center justify-center transition-colors">
                            <i class="ph ph-minus font-bold text-sm"></i>
                        </button>
                        <span class="text-xs font-semibold tracking-widest select-none">${inCart.quantity} IN CART</span>
                        <button onclick="updateQuantity(${p.id}, 1, event)" class="w-12 h-full hover:bg-[#a00000] flex items-center justify-center transition-colors">
                            <i class="ph ph-plus font-bold text-sm"></i>
                        </button>
                    </div>
                `;
            } else {
                return `
                    <button onclick="addToCart(${p.id}, event)" class="mt-4 w-full h-[42px] uppercase tracking-widest text-xs font-semibold border border-gray-300 text-gray-700 hover:bg-[#D30000] hover:text-white hover:border-[#D30000] transition-all duration-300">
                        Add to Cart
                    </button>
                `;
            }
        }

        function getCartTotal() {
            return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        }

        function getCartCount() {
            return cart.reduce((sum, item) => sum + item.quantity, 0);
        }

        function updateCartUI() {
            const count = getCartCount();
            const total = getCartTotal();
            
            // Update Header Badge
            const badge = document.getElementById('cart-badge');
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }

            // Update Solid Sticky Bar
            const pill = document.getElementById('cart-pill');
            const pillText = document.getElementById('cart-pill-text');
            
            if (count > 0 && currentView !== 'cart' && currentView !== 'checkout') {
                // Minimize/hide if viewing a specific product on a large desktop monitor
                if (currentView === 'product' && window.innerWidth >= 1024) {
                    pill.classList.add('translate-y-full');
                } else {
                    pillText.textContent = `${count} ITEM${count !== 1 ? 'S' : ''}  |  $${total.toFixed(2)}`;
                    pill.classList.remove('translate-y-full');
                }
            } else {
                pill.classList.add('translate-y-full');
            }
        }

        function proceedToCheckout() {
            navigate('checkout');
        }

        // --- GLOBAL LOCATION API INTEGRATION ---
        async function setupLocationAPI() {
            const countrySelect = document.getElementById('country');
            const stateSelect = document.getElementById('state');
            const citySelect = document.getElementById('city');
            const phoneCodeSelect = document.getElementById('phoneCode');

            if(!countrySelect) return;

            try {
                // Fetch Countries & Phone Codes concurrently
                const [countriesRes, codesRes] = await Promise.all([
                    fetch('https://countriesnow.space/api/v0.1/countries'),
                    fetch('https://countriesnow.space/api/v0.1/countries/codes')
                ]);
                const countriesData = await countriesRes.json();
                const codesData = await codesRes.json();

                // Populate Countries
                countrySelect.innerHTML = '<option value="" disabled selected>Select Country</option>';
                countriesData.data.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.country;
                    opt.textContent = c.country;
                    countrySelect.appendChild(opt);
                });

                // Populate Phone Dial Codes
                phoneCodeSelect.innerHTML = '<option value="" disabled selected>Code</option>';
                codesData.data.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.dial_code;
                    opt.textContent = `${c.code} (${c.dial_code})`;
                    phoneCodeSelect.appendChild(opt);
                });

                // Listen for Country Change -> Fetch States
                countrySelect.addEventListener('change', async (e) => {
                    const country = e.target.value;
                    stateSelect.innerHTML = '<option value="">Loading states...</option>';
                    citySelect.innerHTML = '<option value="" disabled selected>Select City</option>'; // reset city
                    
                    try {
                        const res = await fetch('https://countriesnow.space/api/v0.1/countries/states', {
                            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({country})
                        });
                        const data = await res.json();
                        
                        stateSelect.innerHTML = '<option value="" disabled selected>Select State</option>';
                        if(data.data && data.data.states && data.data.states.length > 0) {
                            data.data.states.forEach(s => {
                                const opt = document.createElement('option');
                                opt.value = s.name; opt.textContent = s.name;
                                stateSelect.appendChild(opt);
                            });
                        } else {
                            stateSelect.innerHTML = '<option value="N/A">N/A (No states available)</option>';
                        }
                    } catch (err) {
                        stateSelect.outerHTML = '<input type="text" id="state" required class="w-full border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 placeholder-gray-300" placeholder="State/Province">';
                    }
                });

                // Listen for State Change -> Fetch Cities
                stateSelect.addEventListener('change', async (e) => {
                    const state = e.target.value;
                    const country = countrySelect.value;
                    citySelect.innerHTML = '<option value="">Loading cities...</option>';
                    
                    try {
                        const res = await fetch('https://countriesnow.space/api/v0.1/countries/state/cities', {
                            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({country, state})
                        });
                        const data = await res.json();
                        
                        citySelect.innerHTML = '<option value="" disabled selected>Select City</option>';
                        if(data.data && data.data.length > 0) {
                            data.data.forEach(c => {
                                const opt = document.createElement('option');
                                opt.value = c; opt.textContent = c;
                                citySelect.appendChild(opt);
                            });
                        } else {
                            citySelect.innerHTML = '<option value="N/A">N/A (No cities available)</option>';
                        }
                    } catch (err) {
                        citySelect.outerHTML = '<input type="text" id="city" required class="w-full border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 placeholder-gray-300" placeholder="City">';
                    }
                });

            } catch (e) {
                console.warn("Location API blocked or failed, using ultra-reliable text fallback.");
                // Graceful degradation: Turn selects into inputs so user can always checkout
                countrySelect.outerHTML = '<input type="text" id="country" required class="w-full border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 placeholder-gray-300" placeholder="Country">';
                stateSelect.outerHTML = '<input type="text" id="state" required class="w-full border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 placeholder-gray-300" placeholder="State/Province">';
                citySelect.outerHTML = '<input type="text" id="city" required class="w-full border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 placeholder-gray-300" placeholder="City">';
                phoneCodeSelect.outerHTML = '<input type="text" id="phoneCode" class="w-16 border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900" placeholder="+1">';
            }
        }

        // --- CHECKOUT FORM LOGIC ---
        function handleDeliverySubmit(event) {
            event.preventDefault();
            const form = document.getElementById('delivery-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            // Animate Button leftwards and fill it entirely
            const btn = document.getElementById('next-btn');
            btn.classList.add('-translate-x-12', 'bg-[#D30000]', 'scale-105');
            btn.innerHTML = `<i class="ph ph-spinner animate-spin text-2xl"></i>`;
            
            setTimeout(() => {
                document.getElementById('delivery-step').classList.add('hidden');
                document.getElementById('payment-step').classList.remove('hidden');
                initPayPal();
            }, 700);
        }

        // --- UI UTILITIES ---
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = message;
            
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        function showModal(message) {
            const modal = document.getElementById('modal');
            document.getElementById('modal-msg').textContent = message;
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0', 'pointer-events-none');
                modal.classList.add('opacity-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                modal.classList.add('hidden');
                navigate('home');
            }, 300);
        }

        function updateSliderIndicator(index) {
            document.querySelectorAll('.slider-dot').forEach((dot, i) => {
                dot.classList.toggle('bg-[#D30000]', i === index);
                dot.classList.toggle('bg-gray-300', i !== index);
            });
        }

        // --- RENDERING ---
        function render() {
            const content = document.getElementById('app-content');
            content.innerHTML = '';

            if (currentView === 'home') {
                content.innerHTML = renderHome();
            } else if (currentView === 'product') {
                content.innerHTML = renderProduct();
            } else if (currentView === 'cart') {
                content.innerHTML = renderCart();
            } else if (currentView === 'checkout') {
                content.innerHTML = renderCheckout();
                setupLocationAPI(); // Trigger API loading immediately when view is injected
            }
        }

        function renderHome() {
            let gridHtml = PRODUCTS.map(p => {
                return `
                    <div class="group cursor-pointer flex flex-col relative" onclick="navigate('product', ${p.id})">
                        
                        <!-- Badges -->
                        ${p.badge ? `<div class="absolute top-3 left-3 bg-[#D30000] text-white text-[9px] font-bold tracking-widest px-2 py-1 uppercase z-10 shadow-sm">${p.badge}</div>` : ''}
                        
                        <div class="aspect-[4/5] bg-[#F7F7F7] w-full mb-6 overflow-hidden flex items-center justify-center text-gray-300 transition-colors duration-500 group-hover:bg-[#EFEFEF]">
                            <span class="opacity-0 group-hover:opacity-100 transition-opacity duration-300 font-light tracking-widest text-xs uppercase text-gray-500">
                                View Details
                            </span>
                        </div>
                        
                        <div class="flex flex-col items-center text-center flex-1">
                            <h3 class="text-sm md:text-base tracking-wider uppercase text-gray-900 mb-2 font-medium">${p.name}</h3>
                            <p class="text-gray-500 text-sm mb-4 font-light">$${p.price.toFixed(2)}</p>
                            
                            <!-- FOMO, Urgency & Free Shipping cluster -->
                            <div class="w-full mt-auto flex flex-col items-center" onclick="event.stopPropagation()">
                                <div class="flex items-center justify-center gap-3 mb-2">
                                    <span class="text-[9px] font-bold tracking-widest text-[#D30000] uppercase"><i class="ph ph-fire mr-1 text-sm align-text-bottom"></i>${p.sold}+ SOLD</span>
                                    <span class="text-[9px] font-bold tracking-widest text-orange-500 uppercase"><i class="ph ph-clock mr-1 text-sm align-text-bottom"></i>ONLY ${p.left} LEFT</span>
                                </div>
                                <p class="text-[9px] uppercase tracking-widest font-bold text-green-600 mb-1">FREE SHIPPING</p>
                                
                                <div id="btn-container-${p.id}" class="w-full">
                                    ${getButtonHTML(p)}
                                </div>
                            </div>

                        </div>
                    </div>
                `;
            }).join('');

            return `
                <div class="max-w-6xl mx-auto px-4 py-12 fade-in">
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-6 gap-y-16 md:gap-x-8">
                        ${gridHtml}
                    </div>
                </div>
            `;
        }

        function renderProduct() {
            const p = PRODUCTS.find(item => item.id === selectedProductId);
            if (!p) return '';

            return `
                <div class="max-w-6xl mx-auto px-4 py-12 fade-in">
                    <button onclick="navigate('home')" class="flex items-center text-xs tracking-widest uppercase text-gray-500 hover:text-[#D30000] mb-12 transition-colors group">
                        <i class="ph ph-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i> 
                        Back to Collection
                    </button>
                    
                    <div class="flex flex-col md:flex-row gap-12 lg:gap-16">
                        
                        <!-- Premium CSS Slider -->
                        <div class="flex-1 w-full relative group">
                            <div id="product-slider" class="flex overflow-x-auto snap-x snap-mandatory hide-scrollbar gap-0 w-full scroll-smooth shadow-sm">
                                <div class="min-w-full aspect-[4/5] md:aspect-[3/4] bg-[#F7F7F7] snap-center flex items-center justify-center relative">
                                   <span class="text-gray-400 font-light tracking-widest uppercase text-sm">Image 1</span>
                                </div>
                                <div class="min-w-full aspect-[4/5] md:aspect-[3/4] bg-[#EFEFEF] snap-center flex items-center justify-center relative">
                                   <span class="text-gray-400 font-light tracking-widest uppercase text-sm">Image 2</span>
                                </div>
                                <div class="min-w-full aspect-[4/5] md:aspect-[3/4] bg-[#F7F7F7] snap-center flex items-center justify-center relative">
                                   <span class="text-gray-400 font-light tracking-widest uppercase text-sm">Image 3</span>
                                </div>
                            </div>
                            
                            <!-- Slider Controls -->
                            <button onclick="document.getElementById('product-slider').scrollBy({left: -window.innerWidth, behavior: 'smooth'})" class="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/80 backdrop-blur rounded-full flex items-center justify-center text-gray-900 opacity-0 group-hover:opacity-100 transition-opacity shadow-sm">
                                <i class="ph ph-caret-left text-xl"></i>
                            </button>
                            <button onclick="document.getElementById('product-slider').scrollBy({left: window.innerWidth, behavior: 'smooth'})" class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/80 backdrop-blur rounded-full flex items-center justify-center text-gray-900 opacity-0 group-hover:opacity-100 transition-opacity shadow-sm">
                                <i class="ph ph-caret-right text-xl"></i>
                            </button>
                            
                            <p class="text-center text-[10px] uppercase tracking-widest text-gray-400 mt-4"><i class="ph ph-arrows-out-line-horizontal align-middle"></i> Swipe to view more</p>
                        </div>
                        
                        <div class="flex-1 flex flex-col py-8 lg:sticky lg:top-32 h-fit">
                            <h2 class="text-3xl md:text-4xl font-serif uppercase tracking-widest mb-4 text-gray-900">${p.name}</h2>
                            <p class="text-2xl text-gray-600 mb-8 font-light">$${p.price.toFixed(2)}</p>
                            
                            <div class="w-12 h-[1px] bg-[#D30000] mb-8"></div>
                            
                            <p class="text-gray-600 leading-relaxed font-light mb-12 text-lg">${p.description}</p>
                            
                            <p class="text-[10px] uppercase tracking-widest font-bold text-green-600 mb-1">FREE WORLDWIDE SHIPPING</p>
                            <div id="btn-container-${p.id}" class="w-full mb-6">
                                ${getButtonHTML(p)}
                            </div>
                            
                            <div class="border-t border-gray-100 pt-6 mt-6">
                                <p class="text-xs text-gray-500 tracking-wider uppercase flex justify-between mb-2">
                                    <span>Shipping</span> <span>Complimentary</span>
                                </p>
                                <p class="text-xs text-gray-500 tracking-wider uppercase flex justify-between">
                                    <span>Returns</span> <span>Within 30 Days</span>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCart() {
            if (cart.length === 0) {
                return `
                    <div class="max-w-4xl mx-auto px-4 py-12 fade-in">
                        <button onclick="navigate('home')" class="flex items-center text-xs tracking-widest uppercase text-gray-500 hover:text-[#D30000] mb-8 transition-colors group">
                            <i class="ph ph-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i> 
                            Back to Products Section
                        </button>
                        <h2 class="text-3xl font-serif uppercase tracking-widest text-center mb-16">Your Cart</h2>
                        <div class="text-center py-20 bg-gray-50 border border-gray-100">
                            <p class="text-gray-500 mb-6 font-light text-lg">Your selected items will appear here.</p>
                            <button onclick="navigate('home')" class="text-[#D30000] uppercase tracking-widest text-sm border-b border-[#D30000] pb-1 hover:text-[#a00000] hover:border-[#a00000] transition-colors">
                                Continue Shopping
                            </button>
                        </div>
                    </div>
                `;
            }

            let cartHtml = cart.map(item => `
                <div class="py-8 flex items-center justify-between border-b border-gray-100 last:border-0">
                    <div class="flex items-center gap-4 md:gap-6">
                        <div class="w-20 h-28 md:w-24 md:h-32 bg-[#F7F7F7] flex items-center justify-center shrink-0 text-[10px] text-gray-400 uppercase tracking-widest text-center px-1">Img</div>
                        <div>
                            <h4 class="font-serif tracking-wider text-base md:text-lg mb-1">${item.name}</h4>
                            <p class="text-gray-500 text-sm font-light mb-3">$${item.price.toFixed(2)}</p>
                            
                            <!-- Quantity Controls inside Cart -->
                            <div class="flex items-center border border-gray-300 w-fit">
                                <button onclick="updateQuantity(${item.id}, -1)" class="w-8 h-8 flex items-center justify-center text-gray-500 hover:bg-gray-100 hover:text-[#D30000] transition-colors"><i class="ph ph-minus text-xs"></i></button>
                                <span class="text-xs font-medium w-6 text-center select-none">${item.quantity}</span>
                                <button onclick="updateQuantity(${item.id}, 1)" class="w-8 h-8 flex items-center justify-center text-gray-500 hover:bg-gray-100 hover:text-[#D30000] transition-colors"><i class="ph ph-plus text-xs"></i></button>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-4 md:gap-6">
                        <button onclick="removeFromCart(${item.id})" class="text-gray-400 hover:text-[#D30000] transition-colors" title="Remove item">
                            <i class="ph ph-trash text-lg"></i>
                        </button>
                        <p class="font-medium text-base md:text-lg">$${(item.price * item.quantity).toFixed(2)}</p>
                    </div>
                </div>
            `).join('');

            return `
                <div class="max-w-4xl mx-auto px-4 py-12 fade-in">
                    <button onclick="navigate('home')" class="flex items-center text-xs tracking-widest uppercase text-gray-500 hover:text-[#D30000] mb-8 transition-colors group">
                        <i class="ph ph-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i> 
                        Back to Products Section
                    </button>
                    <h2 class="text-3xl font-serif uppercase tracking-widest text-center mb-16">Your Cart</h2>
                    
                    <div class="border-t border-gray-100 mb-12">
                        ${cartHtml}
                    </div>
                    
                    <div class="flex flex-col items-end">
                        <div class="flex justify-between w-full md:w-1/2 mb-2 text-gray-500 text-sm">
                            <span class="uppercase tracking-widest">Subtotal</span>
                            <span>$${getCartTotal().toFixed(2)}</span>
                        </div>
                        <div class="flex justify-between w-full md:w-1/2 mb-8 text-gray-900 text-xl font-serif">
                            <span class="uppercase tracking-widest">Estimated Total</span>
                            <span>$${getCartTotal().toFixed(2)}</span>
                        </div>
                        <p class="text-xs text-gray-400 mb-8 tracking-widest uppercase text-right w-full">
                            Taxes and shipping calculated at checkout
                        </p>
                        
                        <button onclick="proceedToCheckout()" class="bg-[#D30000] text-white uppercase tracking-widest text-sm font-semibold py-5 px-12 hover:bg-[#a00000] transition-colors duration-300 w-full md:w-auto">
                            Proceed to Checkout
                        </button>
                    </div>
                </div>
            `;
        }

        function renderCheckout() {
            const totalPaid = "$" + getCartTotal().toFixed(2);

            return `
                <div class="max-w-xl mx-auto py-12 px-4 fade-in">
                    
                    <div class="bg-gray-50 p-6 md:p-10 rounded-sm mb-8 border border-gray-100 shadow-sm relative overflow-hidden">
                        <div class="flex justify-between mb-8 text-lg text-gray-800">
                            <span class="font-light tracking-wide">Total Amount</span>
                            <span class="font-semibold">${totalPaid} USD</span>
                        </div>
                        <div class="w-full h-[1px] bg-gray-200 mb-10"></div>
                        
                        <!-- STEP 1: Delivery Details -->
                        <div id="delivery-step" class="transition-opacity duration-300">
                            <h2 class="text-2xl font-serif uppercase tracking-widest text-center mb-8 text-gray-900">Delivery Details</h2>
                            
                            <form id="delivery-form" class="space-y-6" onsubmit="handleDeliverySubmit(event)">
                                <div>
                                    <label class="block text-[10px] font-semibold tracking-widest uppercase text-gray-500 mb-1">Email (For Tracking) *</label>
                                    <input type="email" id="email" required class="w-full border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 placeholder-gray-300" placeholder="jane@example.com">
                                </div>
                                
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label class="block text-[10px] font-semibold tracking-widest uppercase text-gray-500 mb-1">Full Name *</label>
                                        <input type="text" id="customerName" required class="w-full border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 placeholder-gray-300" placeholder="Jane Doe">
                                    </div>
                                    <div>
                                        <label class="block text-[10px] font-semibold tracking-widest uppercase text-gray-500 mb-1">Phone Number *</label>
                                        <div class="flex">
                                            <!-- Phone code loads from API dynamically -->
                                            <select id="phoneCode" required class="w-24 border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 cursor-pointer mr-2">
                                                <option value="" disabled selected>Code</option>
                                            </select>
                                            <input type="tel" id="phone" required class="flex-1 border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 placeholder-gray-300" placeholder="(555) 000-0000">
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <label class="block text-[10px] font-semibold tracking-widest uppercase text-gray-500 mb-1">Street Address *</label>
                                    <input type="text" id="address" required class="w-full border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 placeholder-gray-300" placeholder="123 Luxury Lane">
                                </div>

                                <div class="grid grid-cols-2 gap-6">
                                    <div class="col-span-2 md:col-span-1">
                                        <label class="block text-[10px] font-semibold tracking-widest uppercase text-gray-500 mb-1">Country *</label>
                                        <!-- Real world countries load from API dynamically -->
                                        <select id="country" required class="w-full border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 cursor-pointer">
                                            <option value="" disabled selected>Loading...</option>
                                        </select>
                                    </div>
                                    <div class="col-span-2 md:col-span-1">
                                        <label class="block text-[10px] font-semibold tracking-widest uppercase text-gray-500 mb-1">State / Province *</label>
                                        <select id="state" required class="w-full border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 cursor-pointer">
                                            <option value="" disabled selected>Select Country First</option>
                                        </select>
                                    </div>
                                    <div class="col-span-1">
                                        <label class="block text-[10px] font-semibold tracking-widest uppercase text-gray-500 mb-1">City *</label>
                                        <select id="city" required class="w-full border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 cursor-pointer">
                                            <option value="" disabled selected>Select State First</option>
                                        </select>
                                    </div>
                                    <div class="col-span-1">
                                        <label class="block text-[10px] font-semibold tracking-widest uppercase text-gray-500 mb-1">Postal / Zip *</label>
                                        <input type="text" id="zip" required class="w-full border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 placeholder-gray-300" placeholder="10001">
                                    </div>
                                </div>
                                
                                <div class="pt-10 flex justify-center">
                                    <button type="submit" id="next-btn" class="bg-black text-white uppercase tracking-widest text-xs font-semibold py-4 px-12 transition-all duration-500 transform flex items-center justify-center min-w-[160px]">
                                        Next <i class="ph ph-arrow-right ml-2 text-lg"></i>
                                    </button>
                                </div>
                            </form>
                        </div>

                        <!-- STEP 2: Payment Details -->
                        <div id="payment-step" class="hidden fade-in">
                            <h2 class="text-2xl font-serif uppercase tracking-widest text-center mb-8 text-gray-900">Secure Payment</h2>
                            <p class="text-xs text-center text-gray-500 mb-8 tracking-widest uppercase">Select your payment method</p>
                            
                            <div class="relative z-0">
                                <div id="paypal-button-container" class="min-h-[55px]"></div>
                            </div>
                        </div>

                    </div>

                    <div class="text-center mt-6">
                        <button onclick="navigate('cart')" class="text-sm tracking-widest uppercase text-gray-500 hover:text-[#D30000] transition-colors duration-300 border-b border-transparent hover:border-[#D30000] pb-1">
                            <i class="ph ph-arrow-left inline-block mr-1"></i> Back to Cart
                        </button>
                    </div>
                </div>
            `;
        }

        function initPayPal() {
            const container = document.getElementById('paypal-button-container');
            if (!window.paypal) {
                container.innerHTML = '<p class="text-[#D30000] text-sm text-center py-4">Failed to load secure gateway. Please refresh.</p>';
                return;
            }

            container.innerHTML = ''; 
            
            paypal.Buttons({
                style: { color: 'black', shape: 'rect', label: 'pay', height: 55 },
                createOrder: async function(data, actions) {
                    
                    // 1. Gather comprehensive form and cart data
                    const productNames = cart.map(item => `${item.name} (Qty: ${item.quantity})`).join(', ');
                    const orderInfo = {
                        customerName: document.getElementById('customerName').value,
                        email: document.getElementById('email').value,
                        phone: document.getElementById('phoneCode').value + " " + document.getElementById('phone').value,
                        address: document.getElementById('address').value,
                        city: document.getElementById('city').value,
                        state: document.getElementById('state').value,
                        zip: document.getElementById('zip').value,
                        country: document.getElementById('country').value,
                        productName: productNames || "Website Order", 
                        price: "$" + getCartTotal().toFixed(2)
                    };

                    // 2. Transmit Delivery Data to Vercel Backend before unlocking PayPal
                    try {
                        const response = await fetch('https://my-store-backend-mauve.vercel.app/api/checkout', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(orderInfo)
                        });

                        if (!response.ok) {
                            throw new Error("Server rejected data connection.");
                        }
                    } catch (error) {
                        console.error("Vercel Database connection failed:", error);
                        showToast("Failed to connect to secure server. Please check your connection.");
                        throw error; // Halts the PayPal popup if database tracking fails
                    }

                    // 3. Initiate the PayPal order
                    return actions.order.create({
                        purchase_units: [{
                            amount: { value: getCartTotal().toFixed(2) }
                        }]
                    });
                },
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        cart = []; 
                        updateCartUI();
                        updateAllButtons();
                        const buyerName = details.payer.name.given_name;
                        showModal(`Thank you for your elegant purchase, ${buyerName}. Your order from Marina & Elévia has been successfully confirmed and processed securely.`);
                    });
                },
                onError: function(err) {
                    console.error("PayPal Error:", err);
                    showToast("Payment window closed or an error occurred.");
                }
            }).render('#paypal-button-container');
        }

        // Initialize App
        updateCartUI();
        render();
    </script>
</body>
</html>
