    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #111827;
        }
        
        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Animated Zebra Stripes for Best Value */
        @keyframes slideStripes {
            from { background-position: 0 0; }
            to { background-position: 40px 0; }
        }
        .zebra-stripes {
            background-image: repeating-linear-gradient(
                -45deg,
                #D30000,
                #D30000 10px,
                #ffffff 10px,
                #ffffff 20px
            );
            background-size: 56px 56px;
            animation: slideStripes 2s linear infinite;
        }

        /* Hide scrollbar for cleaner look */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        
        /* Form Autofill cleanup */
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px white inset !important;
        }
        
        .snap-always { scroll-snap-stop: always; }
    </style>
</head>

        const CRYPTO_ASSETS = {

        // Countdown Timer Logic
        let countdownInterval;
        function startCountdown() {
            let time = 15 * 60 + 43; // 15 mins 43 secs
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                time--;
                if (time < 0) time = 15 * 60; // reset loop
                const mins = Math.floor(time / 60).toString().padStart(2, '0');
                const secs = (time % 60).toString().padStart(2, '0');
                const el = document.getElementById('timer-display');
                if(el) el.textContent = `Ends in ${mins}:${secs}`;
            }, 1000);
        }

        // --- CORE FUNCTIONS ---
        function navigate(view) {
            currentView = view;

            render();

            } else if (qty === 4) {

                document.getElementById('pack-4').classList.add('border-[#D30000]', 'scale-[1.02]', 'shadow-md');

        }

            if(!selectedOrder) return;
            playClickSound();
            navigate('checkout');
        }

        function toggleReviews() {
            const container = document.getElementById('reviews-container');
            const btn = document.getElementById('toggle-reviews-btn');
            if(container.classList.contains('hidden')) {
                container.classList.remove('hidden');
                btn.textContent = "Hide Reviews";

                container.classList.add('hidden');

        // --- CHECKOUT FORM LOGIC & FIREBASE ---

            event.preventDefault();
            const form = document.getElementById('delivery-form');

                topNotif.classList.remove('translate-y-0', 'opacity-100');
                topNotif.classList.add('-translate-y-32', 'opacity-0', 'pointer-events-none');
                
                document.getElementById('delivery-step').classList.add('hidden');
                document.getElementById('checkout-waiting-header').classList.remove('hidden');

                document.getElementById('payment-step').classList.remove('hidden');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
                initPayPal();
            }, 1200); 
        }

        // --- BIND GLOBALS ---
        window.navigate = navigate;
        window.handleHelpClick = handleHelpClick;
        window.selectPackage = selectPackage;
        window.triggerProceed = triggerProceed;
        window.toggleReviews = toggleReviews;
        window.scrollSlider = scrollSlider;
        window.updateSliderDots = updateSliderDots;
        window.handleDeliverySubmit = handleDeliverySubmit;
        window.goBackToDelivery = () => {
            document.getElementById('payment-step').classList.add('hidden');
            document.getElementById('checkout-waiting-header').classList.add('hidden');
            document.getElementById('checkout-waiting-header').classList.remove('flex');
            document.getElementById('delivery-step').classList.remove('hidden');
            const btn = document.getElementById('next-btn');
            btn.classList.remove('scale-[1.02]');
            btn.innerHTML = `Proceed to Payment <i class="ph ph-arrow-right ml-2 text-lg"></i>`;
        };
        window.openCryptoPopup = openCryptoPopup;
        window.closeCryptoPopup = closeCryptoPopup;
        window.setCryptoNetwork = setCryptoNetwork;
        window.setCryptoToken = setCryptoToken;
        window.processCryptoPayment = processCryptoPayment;
        window.copyText = copyText;

        // --- SLIDER LOGIC ---
        function scrollSlider(direction) {
            const slider = document.getElementById('product-slider');
            const width = slider.clientWidth;
            let nextIndex = Math.round(slider.scrollLeft / width) + direction;
            if (nextIndex > 2) nextIndex = 0;
            if (nextIndex < 0) nextIndex = 2;
            slider.scrollTo({ left: nextIndex * width, behavior: 'smooth' });
        }

        function updateSliderDots(slider) {
            const width = slider.clientWidth;
            if (width === 0) return;
            const index = Math.round(slider.scrollLeft / width);
            document.querySelectorAll('.slider-dot').forEach((dot, i) => {
                dot.classList.toggle('bg-[#D30000]', i === index);
                dot.classList.toggle('bg-gray-300', i !== index);
            });
        }

        // --- FOMO LOGIC ---
        let fomoHideTimeout;
        function triggerFOMO() {
            if (currentView !== 'product') return;
            const popup = document.getElementById('fomo-popup');
            if (!popup) return;
            
            document.getElementById('fomo-name').textContent = FAKE_NAMES[Math.floor(Math.random() * FAKE_NAMES.length)];
            document.getElementById('fomo-action').textContent = FOMO_OPTIONS[Math.floor(Math.random() * FOMO_OPTIONS.length)].text;
            
            popup.classList.remove('translate-y-32', 'opacity-0');
            popup.classList.add('translate-y-0', 'opacity-100');
            
            clearTimeout(fomoHideTimeout);
            fomoHideTimeout = setTimeout(() => {
                popup.classList.remove('translate-y-0', 'opacity-100');
                popup.classList.add('translate-y-32', 'opacity-0');
            }, 4000); 
        }

        let fomoCount = 0;
        function scheduleFOMO() {
            let delay = (fomoCount === 0) ? 2000 : Math.floor(Math.random() * 5000) + 6000;
            setTimeout(() => {
                triggerFOMO();
                fomoCount++;
                scheduleFOMO();
            }, delay);
        }
        scheduleFOMO();

        // --- CRYPTO LOGIC ---
        function openCryptoPopup() {
            cryptoNetwork = 'Ethereum'; cryptoToken = 'ETH';
            const modal = document.getElementById('crypto-modal');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0', 'pointer-events-none'); modal.classList.add('opacity-100'); }, 10);
            renderCryptoModal();
        }
        function closeCryptoPopup() {
            const modal = document.getElementById('crypto-modal');
            modal.classList.remove('opacity-100'); modal.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }
        function setCryptoNetwork(network) { cryptoNetwork = network; cryptoToken = network === 'Ethereum' ? 'ETH' : 'SOL'; renderCryptoModal(); }
        function setCryptoToken(token) { cryptoToken = token; renderCryptoModal(); }

        function renderCryptoModal() {
            const container = document.getElementById('crypto-modal-content');
            if (!container || !selectedOrder) return;
            const cryptoAmountRaw = (selectedOrder.price / (CRYPTO_RATES[cryptoToken] || 1)).toFixed(cryptoToken.includes('USD') ? 2 : 4);
            window.currentCryptoAmount = cryptoAmountRaw;
            const tokens = cryptoNetwork === 'Ethereum' ? ['USDT', 'USDC', 'ETH'] : ['USDT', 'USDC', 'SOL'];

            container.innerHTML = `
                <div class="flex gap-2 p-1 bg-gray-100 rounded-sm mb-4">
                    <button onclick="setCryptoNetwork('Ethereum')" class="flex-1 py-1.5 text-[10px] font-semibold tracking-widest uppercase transition-colors ${cryptoNetwork === 'Ethereum' ? 'bg-white shadow-sm text-black' : 'text-gray-500'}">Ethereum</button>
                    <button onclick="setCryptoNetwork('Solana')" class="flex-1 py-1.5 text-[10px] font-semibold tracking-widest uppercase transition-colors ${cryptoNetwork === 'Solana' ? 'bg-white shadow-sm text-black' : 'text-gray-500'}">Solana</button>
                </div>
                <div class="space-y-2 mb-6">
                    ${tokens.map(token => `
                        <div onclick="setCryptoToken('${token}')" class="flex items-center justify-between p-3 border ${cryptoToken === token ? 'border-[#D30000] bg-red-50/50' : 'border-gray-200'} cursor-pointer rounded-sm">
                            <span class="font-medium text-sm">${token}</span>
                            ${cryptoToken === token ? '<i class="ph-fill ph-check-circle text-[#D30000]"></i>' : ''}
                        </div>
                    `).join('')}
                </div>
                <button onclick="processCryptoPayment()" class="w-full bg-gray-900 text-white uppercase text-xs font-semibold py-3 shadow-lg">
                    Pay ${window.currentCryptoAmount} ${cryptoToken}
                </button>
            `;
        }

        function processCryptoPayment() {
            closeCryptoPopup();
            setTimeout(() => { navigate('crypto-payment'); }, 300);
        }

        // --- LOCATION API ---
        async function setupLocationAPI() {
            const countrySelect = document.getElementById('country');
            const stateSelect = document.getElementById('state');
            const citySelect = document.getElementById('city');
            const phoneCodeSelect = document.getElementById('phoneCode');
            if(!countrySelect) return;

            try {
                const [countriesRes, codesRes] = await Promise.all([ fetch('https://countriesnow.space/api/v0.1/countries'), fetch('https://countriesnow.space/api/v0.1/countries/codes') ]);
                const countriesData = await countriesRes.json();
                const codesData = await codesRes.json();

                countrySelect.innerHTML = '<option value="" disabled selected>Country</option>';
                countriesData.data.forEach(c => { const opt = document.createElement('option'); opt.value = c.country; opt.textContent = c.country; countrySelect.appendChild(opt); });

                phoneCodeSelect.innerHTML = '<option value="" disabled selected>Code</option>';
                codesData.data.forEach(c => { const opt = document.createElement('option'); opt.value = c.dial_code; opt.textContent = `${c.name} (${c.dial_code})`; phoneCodeSelect.appendChild(opt); });

                const defaultCode = codesData.data.find(c => c.code === 'US');
                if (defaultCode) phoneCodeSelect.value = defaultCode.dial_code;

                countrySelect.addEventListener('change', async (e) => {
                    const country = e.target.value;
                    stateSelect.innerHTML = '<option value="">Loading...</option>';
                    try {
                        const res = await fetch('https://countriesnow.space/api/v0.1/countries/states', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({country}) });
                        const data = await res.json();
                        stateSelect.innerHTML = '<option value="" disabled selected>State</option>';
                        data.data.states.forEach(s => { const opt = document.createElement('option'); opt.value = s.name; opt.textContent = s.name; stateSelect.appendChild(opt); });
                    } catch (err) { stateSelect.outerHTML = '<input type="text" id="state" required class="w-full border-b border-gray-300 py-2 bg-transparent text-sm" placeholder="State">'; }
                });

                stateSelect.addEventListener('change', async (e) => {
                    const state = e.target.value; const country = countrySelect.value;
                    citySelect.innerHTML = '<option value="">Loading...</option>';
                    try {
                        const res = await fetch('https://countriesnow.space/api/v0.1/countries/state/cities', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({country, state}) });
                        const data = await res.json();
                        citySelect.innerHTML = '<option value="" disabled selected>City</option>';
                        data.data.forEach(c => { const opt = document.createElement('option'); opt.value = c; opt.textContent = c; citySelect.appendChild(opt); });
                    } catch (err) { citySelect.outerHTML = '<input type="text" id="city" required class="w-full border-b border-gray-300 py-2 bg-transparent text-sm" placeholder="City">'; }
                });

            } catch (e) {
                countrySelect.outerHTML = '<input type="text" id="country" required class="w-full border-b border-gray-300 py-2 text-sm" placeholder="Country">';
                stateSelect.outerHTML = '<input type="text" id="state" required class="w-full border-b border-gray-300 py-2 text-sm" placeholder="State">';
                citySelect.outerHTML = '<input type="text" id="city" required class="w-full border-b border-gray-300 py-2 text-sm" placeholder="City">';
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.remove('opacity-0', 'pointer-events-none'); toast.classList.add('opacity-100');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.classList.remove('opacity-100'); toast.classList.add('opacity-0', 'pointer-events-none'); }, 3000);
        }
        
        function copyText(text, label) {
            const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select();
            try { document.execCommand('copy'); showToast(label + " copied!"); } catch (err) { showToast("Failed to copy."); }
            document.body.removeChild(ta);
        }

        // --- RENDERING VIEWS ---
        function render() {
            const content = document.getElementById('app-content');
            if (currentView === 'product') content.innerHTML = renderProduct();
            else if (currentView === 'checkout') { content.innerHTML = renderCheckout(); setupLocationAPI(); }
            else if (currentView === 'crypto-payment') content.innerHTML = renderCryptoPayment();
            else if (currentView === 'thankyou') content.innerHTML = renderThankYou();
        }

        function renderProduct() {
            const starsHTML = Array(5).fill('<i class="ph-fill ph-star text-sm"></i>').join('');
            const reviewsHTML = PRODUCT.reviewsList.map(r => `
                <div class="border-b border-gray-100 pb-4 pt-4 last:border-0 last:pb-0">
                    <div class="flex items-center justify-between mb-1">
                        <span class="font-medium text-xs text-gray-900">${r.author}</span>
                        <div class="flex gap-0.5 text-[#D30000]">${Array(5).fill('<i class="ph-fill ph-star text-[10px]"></i>').join('')}</div>
                    </div>
                    <span class="text-[8px] uppercase tracking-widest text-green-600 font-bold mb-1.5 block">Verified</span>
                    <p class="text-gray-600 font-light text-xs leading-relaxed">${r.text}</p>
                </div>
            `).join('');

            return `
                <div class="max-w-md mx-auto px-4 py-4 md:py-8 fade-in flex flex-col">
                    
                    <!-- Minimized Image Slider for Above-Fold view -->
                    <div class="w-full relative group mx-auto mb-4">
                        <div id="product-slider" class="flex overflow-x-auto snap-x snap-mandatory hide-scrollbar gap-0 w-full scroll-smooth bg-gray-50 max-h-[260px] md:max-h-[320px]" onscroll="updateSliderDots(this)">
                            <div class="w-full flex-shrink-0 aspect-[4/3] snap-center snap-always flex items-center justify-center relative overflow-hidden">
                               <img src="PE1.png" alt="View 1" class="w-full h-full object-cover">
                            </div>
                            <div class="w-full flex-shrink-0 aspect-[4/3] snap-center snap-always flex items-center justify-center relative overflow-hidden">
                               <img src="PE2.png" alt="View 2" class="w-full h-full object-cover">
                            </div>
                            <div class="w-full flex-shrink-0 aspect-[4/3] snap-center snap-always flex items-center justify-center relative overflow-hidden">
                               <img src="PE3.png" alt="View 3" class="w-full h-full object-cover">
                            </div>
                        </div>
                        
                        <div class="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5 z-10">
                            <div class="slider-dot w-1.5 h-1.5 rounded-full bg-[#D30000] transition-colors"></div>
                            <div class="slider-dot w-1.5 h-1.5 rounded-full bg-gray-300 transition-colors"></div>
                            <div class="slider-dot w-1.5 h-1.5 rounded-full bg-gray-300 transition-colors"></div>
                        </div>
                    </div>
                    
                    <!-- Compact Product Info -->
                    <div class="flex flex-col flex-grow">
                        <h2 class="text-lg md:text-xl font-serif uppercase tracking-widest mb-1 text-gray-900 leading-tight">${PRODUCT.name}</h2>
                        
                        <div class="flex items-center text-[#D30000] mb-3 gap-1">
                            <span class="font-bold text-sm mr-1">${PRODUCT.rating}</span> ${starsHTML}
                            <span class="text-gray-400 text-[10px] ml-1 uppercase tracking-widest">(${PRODUCT.reviews} Reviews)</span>
                        </div>

                        <!-- Visibility emphasized Free Shipping -->
                        <div class="bg-green-50 border border-green-100 text-green-700 px-3 py-1.5 rounded-sm text-[10px] font-bold uppercase tracking-widest inline-flex items-center gap-1.5 mb-3 w-max">
                            <i class="ph-fill ph-truck text-sm"></i> FREE WORLDWIDE SHIPPING
                        </div>
                        
                        <p class="text-xs md:text-sm leading-relaxed text-gray-600 mb-5">${PRODUCT.description}</p>
                        
                        <!-- VERTICAL PACKAGE OPTIONS -->
                        <div class="flex flex-col gap-3 w-full mb-6">
                            
                            <!-- 2 Pairs Option -->
                            <button id="pack-2" onclick="selectPackage(2, 19.99)" class="w-full border border-gray-200 p-4 rounded-sm flex justify-between items-center transition-all duration-200 text-left relative bg-white">
                                <div class="flex flex-col z-10">
                                    <span class="font-serif text-base text-gray-900 font-medium">Buy 2 Pairs</span>
                                    <span class="text-[10px] text-gray-500 uppercase tracking-widest mt-0.5">Everyday Pack</span>
                                </div>
                                <span class="text-lg font-semibold text-gray-900 z-10">$19.99</span>
                            </button>
                            
                            <!-- 4 Pairs Option (Zebra animated best value) -->
                            <button id="pack-4" onclick="selectPackage(4, 28.99)" class="w-full border border-gray-300 p-4 pt-5 rounded-sm flex justify-between items-end transition-all duration-200 text-left relative bg-white overflow-hidden">
                                <!-- Zebra Badge -->
                                <div class="absolute top-0 left-0 w-full h-4 zebra-stripes flex items-center justify-center">
                                    <span class="bg-white px-2 py-[1px] text-[#D30000] text-[8px] uppercase tracking-widest font-black shadow-sm rounded-sm">BEST VALUE</span>
                                </div>
                                
                                <div class="flex flex-col z-10">
                                    <span class="font-serif text-lg text-gray-900 font-medium leading-none mb-1 mt-2">Buy 4 Pairs</span>
                                    <span id="timer-display" class="text-[10px] text-[#D30000] font-bold tracking-widest uppercase">Ends in 15:43</span>
                                </div>
                                <span class="text-xl font-bold text-[#D30000] z-10">$28.99</span>
                            </button>

                            <!-- 6 Pairs Option (Sold Out) -->
                            <div class="w-full border border-red-200 bg-red-50 p-4 rounded-sm flex justify-between items-center relative overflow-hidden cursor-not-allowed opacity-80">
                                <!-- Cross graphic -->
                                <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-0 opacity-50">
                                    <div class="w-[120%] h-[2px] bg-red-400 rotate-12 absolute"></div>
                                    <div class="w-[120%] h-[2px] bg-red-400 -rotate-12 absolute"></div>
                                </div>
                                <!-- Sold Out stamp -->
                                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-[#D30000] text-white text-[10px] font-black uppercase tracking-widest px-3 py-1 shadow-lg z-20 border border-red-800 rotate-[-10deg]">
                                    SOLD OUT
                                </div>
                                
                                <div class="flex flex-col text-left opacity-30 z-10">
                                    <span class="font-serif text-base font-medium">Buy 6 Pairs</span>
                                    <span class="text-[10px] uppercase tracking-widest mt-0.5">Family Pack</span>
                                </div>
                                <span class="text-lg font-semibold opacity-30 z-10">$39.99</span>
                            </div>

                        </div>
                        
                        <!-- Locked Proceed Button -->
                        <button id="proceed-btn" onclick="triggerProceed()" disabled class="w-full bg-gray-800 text-white uppercase tracking-widest text-xs font-semibold py-4 rounded-sm transition-all duration-300 opacity-50 cursor-not-allowed mb-8">
                            Select a Package Above
                        </button>
                        
                        <!-- Toggleable Reviews -->
                        <div class="text-center border-t border-gray-100 pt-6 mt-auto">
                            <button id="toggle-reviews-btn" onclick="toggleReviews()" class="text-[10px] uppercase tracking-widest text-gray-500 underline font-semibold hover:text-[#D30000]">
                                Show Reviews
                            </button>
                            <div id="reviews-container" class="hidden mt-4 text-left">
                                ${reviewsHTML}
                            </div>
                        </div>
                        
                    </div>
                </div>
            `;
        }

        function renderCheckout() {
            if (!selectedOrder) { navigate('product'); return ''; }
            const totalPaid = "$" + selectedOrder.price.toFixed(2);

            return `
                <div class="max-w-md mx-auto py-8 px-4 fade-in">
                    
                    <div class="bg-gray-50 p-5 rounded-sm mb-2 border border-gray-100 shadow-sm relative">
                        <div class="bg-white border border-gray-200 p-3 mb-6 flex justify-between items-center rounded-sm">
                            <div>
                                <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-0.5">Your Selection</p>
                                <p class="font-serif text-sm text-gray-900">${selectedOrder.productName} (x${selectedOrder.quantity})</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-0.5">Total</p>
                                <p class="text-base text-[#D30000] font-bold">${totalPaid}</p>
                            </div>
                        </div>

                        <div id="checkout-waiting-header" class="hidden flex-col items-center justify-center w-full mb-6 border-b border-gray-200 pb-6">
                            <i class="ph ph-spinner animate-spin text-3xl text-[#D30000] mb-3"></i>
                            <h3 class="text-lg font-serif text-gray-900 tracking-wide text-center">Awaiting Payment</h3>
                        </div>
                        
                        <div id="delivery-step" class="transition-opacity duration-300">
                            <h2 class="text-lg font-serif uppercase tracking-widest text-center mb-6 text-gray-900">Delivery Details</h2>
                            <form id="delivery-form" class="space-y-4" onsubmit="handleDeliverySubmit(event)">
                                <div><input type="text" id="customerName" required class="w-full border-b border-gray-300 py-2 bg-transparent text-sm focus:border-[#D30000] outline-none transition-colors" placeholder="Full Name *"></div>
                                <div><input type="email" id="email" required class="w-full border-b border-gray-300 py-2 bg-transparent text-sm focus:border-[#D30000] outline-none transition-colors" placeholder="Email Address *"></div>
                                <div><input type="text" id="address" required class="w-full border-b border-gray-300 py-2 bg-transparent text-sm focus:border-[#D30000] outline-none transition-colors" placeholder="Street Address *"></div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="col-span-2 md:col-span-1"><select id="country" required class="w-full border-b border-gray-300 py-2 bg-transparent text-sm focus:border-[#D30000] outline-none"><option value="">Country</option></select></div>
                                    <div class="col-span-2 md:col-span-1"><select id="state" required class="w-full border-b border-gray-300 py-2 bg-transparent text-sm focus:border-[#D30000] outline-none"><option value="">State</option></select></div>
                                    <div class="col-span-1"><select id="city" required class="w-full border-b border-gray-300 py-2 bg-transparent text-sm focus:border-[#D30000] outline-none"><option value="">City</option></select></div>
                                    <div class="col-span-1"><input type="text" id="zip" required class="w-full border-b border-gray-300 py-2 bg-transparent text-sm focus:border-[#D30000] outline-none" placeholder="Zip *"></div>
                                </div>
                                <div class="flex items-end w-full overflow-hidden">
                                    <select id="phoneCode" required class="w-20 border-b border-gray-300 py-2 bg-transparent text-xs mr-2 focus:border-[#D30000] outline-none"></select>
                                    <input type="tel" id="phone" required oninput="this.value=this.value.replace(/[^0-9]/g,'')" class="flex-1 border-b border-gray-300 py-2 bg-transparent text-sm focus:border-[#D30000] outline-none" placeholder="Phone Number *">
                                </div>
                                <div class="pt-4"><button type="submit" id="next-btn" class="w-full bg-[#D30000] text-white uppercase text-xs font-semibold py-3.5 shadow-md transition-transform">Proceed to Payment <i class="ph ph-arrow-right ml-1"></i></button></div>
                            </form>
                        </div>

                        <div id="payment-step" class="hidden fade-in">
                            <h2 class="text-lg font-serif uppercase tracking-widest text-center mb-6 text-gray-900">Secure Payment</h2>
                            <div id="paypal-ui-container">
                                <div id="paypal-button-container" class="min-h-[55px]"></div>
                                <div class="flex items-center justify-center space-x-4 my-5"><hr class="flex-grow border-gray-200"><span class="text-[9px] text-gray-400 uppercase tracking-widest font-semibold">OR</span><hr class="flex-grow border-gray-200"></div>
                                <button onclick="openCryptoPopup()" class="w-full bg-gray-900 text-white flex items-center justify-center gap-2 py-3 text-xs tracking-widest uppercase font-semibold shadow-md"><i class="ph ph-coin text-lg"></i> Pay with Crypto</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="text-center mt-4">
                        <button onclick="navigate('product')" class="text-xs tracking-widest uppercase text-gray-500 hover:text-[#D30000] border-b border-transparent hover:border-[#D30000] pb-0.5"><i class="ph ph-arrow-left inline-block mr-1"></i> Back to Product</button>
                    </div>
                </div>
            `;
        }

        function renderCryptoPayment() {
            if (!selectedOrder) { navigate('product'); return ''; }
            const address = CRYPTO_ASSETS[cryptoNetwork].address;
            const qrImage = CRYPTO_ASSETS[cryptoNetwork].tokens[cryptoToken];
            const amount = window.currentCryptoAmount;

            return `
                <div class="max-w-md mx-auto py-8 px-4 fade-in">
                    <button onclick="navigate('checkout')" class="flex items-center text-[10px] tracking-widest uppercase text-gray-500 hover:text-[#D30000] mb-6"><i class="ph ph-arrow-left mr-1"></i> Back to Checkout</button>
                    <div class="bg-white p-6 rounded-sm border border-gray-100 shadow-xl text-center">
                        <h2 class="text-xl font-serif text-gray-900 mb-4">Send ${amount} ${cryptoToken}</h2>
                        <div class="bg-gray-50 p-3 rounded-lg mb-5 inline-block border border-gray-100"><img src="${qrImage}" alt="QR" class="w-40 h-40 object-contain rounded-md"></div>
                        <div class="mb-6">
                            <p class="text-[10px] tracking-widest uppercase text-gray-500 mb-0.5">Token to Send</p>
                            <p class="text-lg font-bold text-gray-900">${cryptoToken} <span class="text-xs font-normal text-gray-500">(${cryptoNetwork})</span></p>
                        </div>
                        <div class="space-y-3 text-left">
                            <div>
                                <p class="text-[10px] tracking-widest uppercase text-gray-500 mb-1">Address</p>
                                <div class="flex items-center justify-between bg-gray-50 border border-gray-200 p-2 rounded-sm"><span class="text-xs text-gray-800 font-mono truncate mr-2">${address}</span><button onclick="copyText('${address}', 'Address')" class="text-gray-500"><i class="ph ph-copy text-lg"></i></button></div>
                            </div>
                            <div>
                                <p class="text-[10px] tracking-widest uppercase text-gray-500 mb-1">Amount</p>
                                <div class="flex items-center justify-between bg-gray-50 border border-gray-200 p-2 rounded-sm"><span class="text-xs text-gray-800 font-mono">${amount}</span><button onclick="copyText('${amount}', 'Amount')" class="text-gray-500"><i class="ph ph-copy text-lg"></i></button></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderThankYou() {
            const date = new Date(); date.setDate(date.getDate() + 10);
            return `
                <div class="max-w-md mx-auto py-20 px-4 fade-in text-center">
                    <div class="w-16 h-16 bg-[#D30000] text-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg"><i class="ph ph-check text-3xl font-bold"></i></div>
                    <h2 class="text-2xl font-serif tracking-widest uppercase mb-4 text-gray-900">Thank You!</h2>
                    <p class="text-sm text-gray-600 mb-6 font-light">Your order is confirmed.</p>
                    <div class="bg-gray-50 p-5 border border-gray-100 text-left mb-8 shadow-sm text-sm">
                        <div class="mb-4"><p class="text-[10px] tracking-widest uppercase text-gray-400 mb-0.5">Est. Delivery</p><p class="text-gray-900 font-serif">${date.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' })}</p></div>
                        <div><p class="text-[10px] tracking-widest uppercase text-gray-400 mb-0.5">Details Sent To</p><p class="font-medium text-[#D30000] break-all">${finalCustomerEmail}</p></div>
                    </div>
                    <button onclick="navigate('product')" class="text-xs tracking-widest uppercase text-gray-500 hover:text-[#D30000] border-b border-transparent hover:border-[#D30000] pb-0.5">Return to Store</button>
                </div>
            `;
        }

        // Initialize App
        render();
        startCountdown();
    </script>
</body>
</html>
