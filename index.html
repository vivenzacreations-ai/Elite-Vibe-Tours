            from { opacity: 0; transform: translateY(10px); }

        // --- BIND GLOBALS FOR MODULE SCRIPT ---
        window.navigate = navigate;
        window.handleHelpClick = handleHelpClick;

        window.scrollSlider = scrollSlider;

        window.goBackToDelivery = goBackToDelivery;
        window.openCryptoPopup = openCryptoPopup;

        window.setCryptoNetwork = setCryptoNetwork;
        window.setCryptoToken = setCryptoToken;
        window.processCryptoPayment = processCryptoPayment;
        window.copyText = copyText;

        // --- SLIDER LOGIC ---
        function scrollSlider(direction) {
            const slider = document.getElementById('product-slider');
            const width = slider.clientWidth;
            const maxIndex = 2; // 3 images
            
            let currentIndex = Math.round(slider.scrollLeft / width);
            let nextIndex = currentIndex + direction;
            
            if (nextIndex > maxIndex) nextIndex = 0;
            if (nextIndex < 0) nextIndex = maxIndex;
            
            slider.scrollTo({ left: nextIndex * width, behavior: 'smooth' });
        }

        function updateSliderDots(slider) {
            const width = slider.clientWidth;
            if (width === 0) return;
            const index = Math.round(slider.scrollLeft / width);
            document.querySelectorAll('.slider-dot').forEach((dot, i) => {
                dot.classList.toggle('bg-[#D30000]', i === index);
                dot.classList.toggle('bg-gray-300', i !== index);
            });
        }

        // --- FOMO NOTIFICATION LOGIC ---
        let fomoHideTimeout;
        function triggerFOMO() {
            if (currentView !== 'product') return;
            
            const popup = document.getElementById('fomo-popup');
            if (!popup) return;
            
            const randomName = FAKE_NAMES[Math.floor(Math.random() * FAKE_NAMES.length)];
            const randomOption = FOMO_OPTIONS[Math.floor(Math.random() * FOMO_OPTIONS.length)];
            
            document.getElementById('fomo-name').textContent = randomName;
            document.getElementById('fomo-action').textContent = randomOption.text;
            
            popup.classList.remove('translate-y-40', 'opacity-0');
            popup.classList.add('translate-y-0', 'opacity-100');
            
            if (fomoHideTimeout) clearTimeout(fomoHideTimeout);
            
            fomoHideTimeout = setTimeout(() => {
                popup.classList.remove('translate-y-0', 'opacity-100');
                popup.classList.add('translate-y-40', 'opacity-0');
            }, 4000); 
        }

        let fomoCount = 0;
        function scheduleFOMO() {
            let delay;
            if (fomoCount === 0) delay = 2000;       
            else if (fomoCount === 1) delay = 6000;  
            else if (fomoCount === 2) delay = 8000;  
            else {
                delay = Math.floor(Math.random() * 4000) + 8000;
            }
            
            setTimeout(() => {
                triggerFOMO();
                fomoCount++;
                scheduleFOMO();
            }, delay);
        }

        scheduleFOMO();

        // --- CRYPTO PAYMENT LOGIC ---
        function openCryptoPopup() {
            cryptoNetwork = 'Ethereum';
            cryptoToken = 'ETH';
            
            const modal = document.getElementById('crypto-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0', 'pointer-events-none');
                modal.classList.add('opacity-100');

            renderCryptoModal();
        }

        function closeCryptoPopup() {
            const modal = document.getElementById('crypto-modal');
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function setCryptoNetwork(network) {
            cryptoNetwork = network;
            cryptoToken = network === 'Ethereum' ? 'ETH' : 'SOL'; // Default tokens per network

        }

        function setCryptoToken(token) {
            cryptoToken = token;
            renderCryptoModal();
        }

        function renderCryptoModal() {

            const totalDueFiat = selectedOrder.price;
            const exchangeRate = CRYPTO_RATES[cryptoToken] || 1;

            window.currentCryptoAmount = cryptoAmountRaw;

            const tokens = cryptoNetwork === 'Ethereum' 
                ? ['USDT', 'USDC', 'ETH'] 
                : ['USDT', 'USDC', 'SOL'];

                    <button onclick="setCryptoNetwork('Ethereum')" class="flex-1 py-2 text-[10px] font-semibold tracking-widest uppercase transition-colors ${cryptoNetwork === 'Ethereum' ? 'bg-white shadow-sm text-black' : 'text-gray-500 hover:text-black'}">Ethereum</button>
                    <button onclick="setCryptoNetwork('Solana')" class="flex-1 py-2 text-[10px] font-semibold tracking-widest uppercase transition-colors ${cryptoNetwork === 'Solana' ? 'bg-white shadow-sm text-black' : 'text-gray-500 hover:text-black'}">Solana</button>
                </div>

                <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-3">Select Token</p>
                
                <!-- Token List -->
                <div class="space-y-2 mb-8">
                    ${tokens.map(token => `
                        <div onclick="setCryptoToken('${token}')" class="flex items-center justify-between p-4 border ${cryptoToken === token ? 'border-[#D30000] bg-red-50/50' : 'border-gray-200 hover:border-gray-300'} cursor-pointer transition-colors rounded-sm">
                            <div class="flex items-center gap-3">
                                <i class="ph ph-coin text-xl ${cryptoToken === token ? 'text-[#D30000]' : 'text-gray-400'}"></i>
                                <span class="font-medium text-gray-900">${token} <span class="text-gray-400 text-xs font-light ml-1">(${cryptoNetwork})</span></span>
                            </div>
                            ${cryptoToken === token ? '<i class="ph-fill ph-check-circle text-[#D30000] text-lg"></i>' : ''}
                        </div>
                    `).join('')}
                </div>

                <!-- Total Amount Summary -->
                <div class="flex justify-between items-end mb-6 pt-4 border-t border-gray-100">
                    <span class="text-[10px] uppercase tracking-widest text-gray-500 font-semibold">Total Due</span>
                    <div class="text-right">
                        <div class="text-2xl font-serif text-gray-900">${window.currentCryptoAmount} ${cryptoToken}</div>
                        <div class="text-xs text-gray-400 font-light tracking-wide mt-1">≈ $${totalDueFiat.toFixed(2)} USD</div>
                    </div>
                </div>

                <!-- Action Button -->
                <button onclick="processCryptoPayment()" class="w-full bg-gray-900 text-white uppercase tracking-widest text-xs font-semibold py-4 hover:bg-black transition-colors shadow-lg">
                    Pay with ${window.currentCryptoAmount} ${cryptoToken}

        }

        function processCryptoPayment() {
            closeCryptoPopup();

        // --- GLOBAL LOCATION DROPDOWNS API ---
        async function setupLocationAPI() {
            const countrySelect = document.getElementById('country');
            const stateSelect = document.getElementById('state');
            const citySelect = document.getElementById('city');
            const phoneCodeSelect = document.getElementById('phoneCode');

            if(!countrySelect) return;

            try {
                const [countriesRes, codesRes] = await Promise.all([
                    fetch('https://countriesnow.space/api/v0.1/countries'),
                    fetch('https://countriesnow.space/api/v0.1/countries/codes')
                ]);
                const countriesData = await countriesRes.json();
                const codesData = await codesRes.json();

                countrySelect.innerHTML = '<option value="" disabled selected>Select Country</option>';
                countriesData.data.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.country;
                    opt.textContent = c.country;
                    countrySelect.appendChild(opt);
                });

                phoneCodeSelect.innerHTML = '<option value="" disabled selected>Code</option>';
                codesData.data.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.dial_code;
                    opt.textContent = `${c.name} (${c.dial_code})`;
                    phoneCodeSelect.appendChild(opt);
                });

                // Default to US & dynamic limits
                window.updatePhoneLimit = function(selectElem) {
                    const phoneInput = document.getElementById('phone');
                    if(!phoneInput) return;
                    const code = selectElem.value;
                    const lengthMap = { '+91': 10, '+1': 10, '+44': 10, '+61': 9 };
                    phoneInput.maxLength = lengthMap[code] || 15;
                };

                const defaultCode = codesData.data.find(c => c.code === 'US');
                if (defaultCode) {
                    phoneCodeSelect.value = defaultCode.dial_code;
                    window.updatePhoneLimit(phoneCodeSelect);
                }

                phoneCodeSelect.addEventListener('change', function() {
                    window.updatePhoneLimit(this);
                });

                countrySelect.addEventListener('change', async (e) => {
                    const country = e.target.value;
                    stateSelect.innerHTML = '<option value="">Loading states...</option>';
                    citySelect.innerHTML = '<option value="" disabled selected>Select City</option>'; 
                    
                    try {
                        const res = await fetch('https://countriesnow.space/api/v0.1/countries/states', {
                            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({country})
                        });
                        const data = await res.json();
                        
                        stateSelect.innerHTML = '<option value="" disabled selected>Select State</option>';
                        if(data.data && data.data.states && data.data.states.length > 0) {
                            data.data.states.forEach(s => {
                                const opt = document.createElement('option');
                                opt.value = s.name; opt.textContent = s.name;
                                stateSelect.appendChild(opt);
                            });
                        } else {
                            stateSelect.innerHTML = '<option value="N/A">N/A (No states available)</option>';
                        }
                    } catch (err) {
                        stateSelect.outerHTML = '<input type="text" id="state" required class="w-full border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 placeholder-gray-300" placeholder="State/Province">';
                    }
                });

                stateSelect.addEventListener('change', async (e) => {
                    const state = e.target.value;
                    const country = countrySelect.value;
                    citySelect.innerHTML = '<option value="">Loading cities...</option>';
                    
                    try {
                        const res = await fetch('https://countriesnow.space/api/v0.1/countries/state/cities', {
                            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({country, state})
                        });
                        const data = await res.json();
                        
                        citySelect.innerHTML = '<option value="" disabled selected>Select City</option>';
                        if(data.data && data.data.length > 0) {
                            data.data.forEach(c => {
                                const opt = document.createElement('option');
                                opt.value = c; opt.textContent = c;
                                citySelect.appendChild(opt);
                            });
                        } else {
                            citySelect.innerHTML = '<option value="N/A">N/A (No cities available)</option>';
                        }
                    } catch (err) {

        // --- UI UTILITIES ---
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = message;
            
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }
        
        function copyText(text, label) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast(label + " copied to clipboard!");
            } catch (err) {
                showToast("Failed to copy.");
            }
            document.body.removeChild(textArea);
        }

                        form.reportValidity(); 
                        return actions.reject(); 
                    }
                    
                    document.getElementById('paypal-ui-container').classList.add('hidden');
                    document.getElementById('payment-waiting').classList.remove('hidden');
                    return actions.resolve(); 
                },
                onCancel: function (data) {
                    document.getElementById('paypal-ui-container').classList.remove('hidden');
                    document.getElementById('payment-waiting').classList.add('hidden');
                },
                createOrder: function(data, actions) {
                    return actions.order.create({
                        purchase_units: [{
                            amount: { value: selectedOrder.price.toFixed(2) }
                        }]
                    });
                },
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        selectedOrder = null;
                        navigate('thankyou');
                    });
                },
                onError: function(err) {
                    console.error("PayPal Error:", err);
                    document.getElementById('paypal-ui-container').classList.remove('hidden');
                    document.getElementById('payment-waiting').classList.add('hidden');
                    showToast("Payment window closed or an error occurred.");
                }
            }).render('#paypal-button-container');
        }

        // Initialize App directly to product
        render();
    </script>
</body>
</html>
