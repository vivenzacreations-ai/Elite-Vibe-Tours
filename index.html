        body {

            color: #111827;

        }

        .fade-in {

        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hide scrollbar for cleaner look */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        
        /* Form Autofill cleanup */
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px white inset !important;

        /* Enforces strict 1-image per swipe */

        // --- CORE FUNCTIONS ---
        function navigate(view, productId = null) {
            currentView = view;

            window.scrollTo(0, 0);
            updateCartUI(); 
            render();
        }

        function handleHelpClick() {
            const overlay = document.getElementById('help-overlay');

        function handleCartClick() {
            const icon = document.getElementById('cart-icon');
            icon.classList.remove('ph');
            icon.classList.add('ph-fill', 'text-[#D30000]');
            setTimeout(() => {
                icon.classList.remove('ph-fill', 'text-[#D30000]');
                icon.classList.add('ph');
                navigate('cart');
            }, 150);
        }

        function addToCart(productId, event) {
            if(event) event.stopPropagation();
            
            const product = PRODUCTS.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCartUI();
            updateAllButtons();
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
            updateAllButtons();
        }

        function updateQuantity(productId, delta, event) {
            if(event) event.stopPropagation();
            const item = cart.find(i => i.id === productId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    updateCartUI();
                    updateAllButtons();
                }
            }
        }

        function updateAllButtons() {
            if (currentView === 'cart') {
                render(); 
                return;
            }
            
            if (currentView === 'product') {
                const btnContainer = document.getElementById(`btn-container-${selectedProductId}`);
                const p = PRODUCTS.find(item => item.id === selectedProductId);
                if (btnContainer && p) {
                    btnContainer.innerHTML = getButtonHTML(p, 'large');
                }
            } else if (currentView === 'home') {
                PRODUCTS.forEach(p => {
                    const btnContainer = document.getElementById(`btn-container-${p.id}`);
                    if (btnContainer) {
                        btnContainer.innerHTML = getButtonHTML(p, 'normal');
                    }
                });
            }
        }

        function getButtonHTML(p, size = 'normal') {
            const inCart = cart.find(item => item.id === p.id);
            const heightClass = size === 'large' ? 'h-[58px] text-sm' : 'h-[42px] text-xs';
            
            if (inCart) {
                return `
                    <div class="mt-4 w-full flex items-center justify-between border border-[#D30000] bg-[#D30000] text-white transition-all duration-300 shadow-md ${heightClass}">
                        <button onclick="updateQuantity(${p.id}, -1, event)" class="w-14 h-full hover:bg-[#a00000] flex items-center justify-center transition-colors">
                            <i class="ph ph-minus font-bold"></i>
                        </button>
                        <span class="font-semibold tracking-widest select-none">${inCart.quantity} IN CART</span>
                        <button onclick="updateQuantity(${p.id}, 1, event)" class="w-14 h-full hover:bg-[#a00000] flex items-center justify-center transition-colors">
                            <i class="ph ph-plus font-bold"></i>
                        </button>
                    </div>
                `;
            } else {
                return `
                    <button onclick="addToCart(${p.id}, event)" class="mt-4 w-full ${heightClass} uppercase tracking-widest font-semibold border border-gray-300 text-gray-700 hover:bg-[#D30000] hover:text-white hover:border-[#D30000] transition-all duration-300">
                        Add to Cart
                    </button>
                `;
            }
        }

        function getCartTotal() {
            return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        }

        function getCartCount() {
            return cart.reduce((sum, item) => sum + item.quantity, 0);
        }
        
        function getCartOriginalTotal() {
            return cart.reduce((sum, item) => sum + (item.originalPrice * item.quantity), 0);
        }

        function updateCartUI() {
            const count = getCartCount();
            const total = getCartTotal();
            
            const badge = document.getElementById('cart-badge');
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }

            const pill = document.getElementById('cart-pill');
            const pillText = document.getElementById('cart-pill-text');
            
            if (count > 0 && currentView !== 'cart' && currentView !== 'checkout' && currentView !== 'thankyou') {
                if (currentView === 'product' && window.innerWidth >= 1024) {
                    pill.classList.add('translate-y-full');
                } else {
                    pillText.textContent = `${count} ITEM${count !== 1 ? 'S' : ''}  |  $${total.toFixed(2)}`;
                    pill.classList.remove('translate-y-full');
                }
            } else {
                pill.classList.add('translate-y-full');
            }
        }

        // --- SLIDER LOGIC ---
        function scrollSlider(direction) {
            const slider = document.getElementById('product-slider');
            const width = slider.clientWidth;
            const maxIndex = 2; // 3 images
            
            let currentIndex = Math.round(slider.scrollLeft / width);
            let nextIndex = currentIndex + direction;
            
            if (nextIndex > maxIndex) nextIndex = 0;
            if (nextIndex < 0) nextIndex = maxIndex;
            
            slider.scrollTo({ left: nextIndex * width, behavior: 'smooth' });
        }

        function updateSliderDots(slider) {
            const width = slider.clientWidth;
            if (width === 0) return;
            const index = Math.round(slider.scrollLeft / width);
            document.querySelectorAll('.slider-dot').forEach((dot, i) => {
                dot.classList.toggle('bg-[#D30000]', i === index);
                dot.classList.toggle('bg-gray-300', i !== index);
            });
        }

        // --- GLOBAL LOCATION & SEARCHABLE DROPDOWNS API ---
        async function setupLocationAPI() {
            const countrySelect = document.getElementById('country');
            const stateSelect = document.getElementById('state');
            const citySelect = document.getElementById('city');
            const phoneCodeSelect = document.getElementById('phoneCode');

            if(!countrySelect) return;

            try {
                const [countriesRes, codesRes] = await Promise.all([
                    fetch('https://countriesnow.space/api/v0.1/countries'),
                    fetch('https://countriesnow.space/api/v0.1/countries/codes')
                ]);
                const countriesData = await countriesRes.json();
                const codesData = await codesRes.json();

                countrySelect.innerHTML = '<option value="" disabled selected>Select Country</option>';
                countriesData.data.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.country;
                    opt.textContent = c.country;
                    countrySelect.appendChild(opt);
                });

                phoneCodeSelect.innerHTML = '<option value="" disabled selected>Code</option>';
                codesData.data.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.dial_code;
                    opt.textContent = `${c.name} (${c.dial_code})`;
                    phoneCodeSelect.appendChild(opt);
                });

                const defaultCode = codesData.data.find(c => c.code === 'US');
                if (defaultCode) phoneCodeSelect.value = defaultCode.dial_code;

                countrySelect.addEventListener('change', async (e) => {
                    const country = e.target.value;
                    stateSelect.innerHTML = '<option value="">Loading states...</option>';
                    citySelect.innerHTML = '<option value="" disabled selected>Select City</option>'; 
                    
                    try {
                        const res = await fetch('https://countriesnow.space/api/v0.1/countries/states', {
                            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({country})
                        });
                        const data = await res.json();
                        
                        stateSelect.innerHTML = '<option value="" disabled selected>Select State</option>';
                        if(data.data && data.data.states && data.data.states.length > 0) {
                            data.data.states.forEach(s => {
                                const opt = document.createElement('option');
                                opt.value = s.name; opt.textContent = s.name;
                                stateSelect.appendChild(opt);
                            });
                        } else {
                            stateSelect.innerHTML = '<option value="N/A">N/A (No states available)</option>';
                        }
                    } catch (err) {
                        stateSelect.outerHTML = '<input type="text" id="state" required class="w-full border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 placeholder-gray-300" placeholder="State/Province">';
                    }
                });

                stateSelect.addEventListener('change', async (e) => {
                    const state = e.target.value;
                    const country = countrySelect.value;
                    citySelect.innerHTML = '<option value="">Loading cities...</option>';
                    
                    try {
                        const res = await fetch('https://countriesnow.space/api/v0.1/countries/state/cities', {
                            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({country, state})
                        });
                        const data = await res.json();
                        
                        citySelect.innerHTML = '<option value="" disabled selected>Select City</option>';
                        if(data.data && data.data.length > 0) {
                            data.data.forEach(c => {
                                const opt = document.createElement('option');
                                opt.value = c; opt.textContent = c;
                                citySelect.appendChild(opt);
                            });
                        } else {
                            citySelect.innerHTML = '<option value="N/A">N/A (No cities available)</option>';
                        }
                    } catch (err) {
                        citySelect.outerHTML = '<input type="text" id="city" required class="w-full border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 placeholder-gray-300" placeholder="City">';
                    }
                });

            } catch (e) {
                console.warn("Location API fallback active.");
                countrySelect.outerHTML = '<input type="text" id="country" required class="w-full border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 placeholder-gray-300" placeholder="Country">';

        // --- CHECKOUT FORM LOGIC & FIREBASE ---
        function handleDeliverySubmit(event) {
            event.preventDefault();
            const form = document.getElementById('delivery-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            
            finalCustomerEmail = document.getElementById('email').value;

            // Animate Button RIGHTWARDS and fill it entirely
            const btn = document.getElementById('next-btn');
            btn.classList.add('translate-x-12', 'bg-[#D30000]', 'scale-105');
            btn.innerHTML = `<i class="ph ph-spinner animate-spin text-2xl"></i>`;
            
            // Collect order payload for Firebase
            const orderData = {
                customerDetails: {
                    name: document.getElementById('customerName').value,
                    email: finalCustomerEmail,
                    phone: document.getElementById('phoneCode').value + " " + document.getElementById('phone').value,
                    address: document.getElementById('address').value,
                    country: document.getElementById('country').value,
                    state: document.getElementById('state').value,
                    city: document.getElementById('city').value,
                    zip: document.getElementById('zip').value
                },
                cart: cart.map(item => ({
                    id: item.id,
                    name: item.name,
                    price: item.price,
                    quantity: item.quantity
                })),
                totalPrice: getCartTotal(),
                createdAt: serverTimestamp()
            };

            // Fire and forget Firebase save (doesn't block the UI transition)
            addDoc(collection(db, "delivery_orders"), orderData)
                .then(() => console.log("Order saved to secure Firebase."))
                .catch(error => console.error("Firebase Database error:", error));
            
            setTimeout(() => {
                document.getElementById('delivery-step').classList.add('hidden');
                document.getElementById('delivery-back').classList.add('hidden');
                
                document.getElementById('payment-step').classList.remove('hidden');
                document.getElementById('payment-back').classList.remove('hidden');
                initPayPal();
            }, 600);
        }

        function goBackToDelivery() {
            document.getElementById('payment-step').classList.add('hidden');
            document.getElementById('payment-back').classList.add('hidden');
            
            document.getElementById('delivery-step').classList.remove('hidden');
            document.getElementById('delivery-back').classList.remove('hidden');
            
            const btn = document.getElementById('next-btn');
            btn.classList.remove('translate-x-12', 'bg-[#D30000]', 'scale-105');
            btn.innerHTML = `Next <i class="ph ph-arrow-right ml-2 text-lg"></i>`;
        }

            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = message;
            
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                modal.classList.add('hidden');

            } else if (currentView === 'product') {
                content.innerHTML = renderProduct();

                            <!-- "Waiting for Payment" State -->
                            <div id="payment-waiting" class="hidden text-center py-10 fade-in">
                                <i class="ph ph-spinner animate-spin text-[40px] text-[#D30000] mb-4 inline-block"></i>
                                <p class="text-gray-900 font-serif text-lg tracking-wide">Waiting for your payment...</p>
                                <p class="text-xs text-gray-400 uppercase tracking-widest mt-2">Please complete the transaction in the secure window.</p>
                            </div>
                        </div>

                    </div>

                    <div id="delivery-back" class="text-center mt-6">
                        <button onclick="navigate('cart')" class="text-sm tracking-widest uppercase text-gray-500 hover:text-[#D30000] transition-colors duration-300 border-b border-transparent hover:border-[#D30000] pb-1">
                            <i class="ph ph-arrow-left inline-block mr-1"></i> Back to Cart
                        </button>
                    </div>
                    
                    <div id="payment-back" class="text-center mt-6 hidden">
                        <button onclick="goBackToDelivery()" class="text-sm tracking-widest uppercase text-gray-500 hover:text-[#D30000] transition-colors duration-300 border-b border-transparent hover:border-[#D30000] pb-1">
                            <i class="ph ph-arrow-left inline-block mr-1"></i> Back to Delivery Details
                        </button>
                    </div>
                </div>
            `;
        }

        function renderThankYou() {
            // Calculate Date 10 days from now
            const deliveryDate = new Date();
            deliveryDate.setDate(deliveryDate.getDate() + 10);
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const formattedDate = deliveryDate.toLocaleDateString(undefined, dateOptions);

            return `
                <div class="max-w-xl mx-auto py-24 px-4 fade-in text-center">
                    <div class="w-20 h-20 bg-[#D30000] text-white rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl">
                        <i class="ph ph-check text-4xl font-bold"></i>
                    </div>
                    <h2 class="text-4xl font-serif tracking-widest uppercase mb-6 text-gray-900">Thank You!</h2>
                    <p class="text-xl text-gray-600 mb-8 font-light">Your elegant order has been placed successfully.</p>
                    
                    <div class="bg-gray-50 p-8 border border-gray-100 text-left mb-10 shadow-sm">
                        <div class="mb-6">
                            <p class="text-xs tracking-widest uppercase text-gray-400 mb-1">Estimated Delivery</p>
                            <p class="text-lg text-gray-900 font-serif">${formattedDate}</p>
                        </div>
                        <div>
                            <p class="text-xs tracking-widest uppercase text-gray-400 mb-1">Confirmation Email</p>
                            <p class="text-base text-gray-900">Your tracking and order details will be mailed to <span class="font-medium text-[#D30000]">${finalCustomerEmail}</span>.</p>
                        </div>
                    </div>

                    <button onclick="navigate('home')" class="text-sm tracking-widest uppercase text-gray-500 hover:text-[#D30000] transition-colors duration-300 border-b border-transparent hover:border-[#D30000] pb-1">
                        Return to Home
                    </button>
                </div>
            `;
        }

        function initPayPal() {
            const container = document.getElementById('paypal-button-container');
            if (!window.paypal) {
                container.innerHTML = '<p class="text-[#D30000] text-sm text-center py-4">Failed to load secure gateway. Please refresh.</p>';
                return;
            }

            container.innerHTML = ''; 
            
            paypal.Buttons({
                style: { color: 'black', shape: 'rect', label: 'pay', height: 55 },
                onClick: function(data, actions) {
                    const form = document.getElementById('delivery-form');
                    if (!form.checkValidity()) {
                        form.reportValidity(); 
                        return actions.reject(); 
                    }
                    
                    document.getElementById('paypal-ui-container').classList.add('hidden');
                    document.getElementById('payment-waiting').classList.remove('hidden');
                    return actions.resolve(); 
                },
                onCancel: function (data) {
                    document.getElementById('paypal-ui-container').classList.remove('hidden');
                    document.getElementById('payment-waiting').classList.add('hidden');
                },
                createOrder: function(data, actions) {
                    return actions.order.create({
                        purchase_units: [{
                            amount: { value: getCartTotal().toFixed(2) }
                        }]
                    });
                },
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        cart = []; 
                        updateCartUI();
                        updateAllButtons();
                        navigate('thankyou');
                    });
                },
                onError: function(err) {
                    console.error("PayPal Error:", err);
                    document.getElementById('paypal-ui-container').classList.remove('hidden');
                    document.getElementById('payment-waiting').classList.add('hidden');
                    showToast("Payment window closed or an error occurred.");
                }
            }).render('#paypal-button-container');
        }

        // --- BIND GLOBALS FOR MODULE SCRIPT ---
        window.navigate = navigate;
        window.handleHelpClick = handleHelpClick;
        window.handleCartClick = handleCartClick;
        window.addToCart = addToCart;
        window.removeFromCart = removeFromCart;
        window.updateQuantity = updateQuantity;
        window.proceedToCheckout = proceedToCheckout;
        window.scrollSlider = scrollSlider;
        window.updateSliderDots = updateSliderDots;
        window.handleDeliverySubmit = handleDeliverySubmit;
        window.goBackToDelivery = goBackToDelivery;
        window.closeModal = closeModal;

        // Initialize App
        updateCartUI();
        render();
    </script>
</body>
</html>
