<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marina & Elévia</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- PayPal JS SDK (Using Client ID) -->
    <script src="https://www.paypal.com/sdk/js?client-id=AYgtpNcMYauLd1IW8nzAsfQw-sWG3mqR2-YbsqJDUvTHx6SaQjnXAj42lacA_t-qHa1SYklPM53tTY0P&currency=USD"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #111827;
        }
        
        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hide scrollbar for cleaner look */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        
        /* Form Autofill cleanup */
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px white inset !important;
        }
        
        /* Enforces strict 1-image per swipe */
        .snap-always { scroll-snap-stop: always; }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-[#f8d7d7] relative overflow-x-hidden">

    <!-- Header -->
    <header class="sticky top-0 bg-white/90 backdrop-blur-md border-b-[2px] border-[#D30000] z-40">
        <div class="max-w-6xl mx-auto px-4 h-24 flex items-center justify-between">
            
            <h1 onclick="navigate('home')" class="text-2xl md:text-3xl font-serif tracking-widest uppercase cursor-pointer flex-shrink-0 hover:opacity-80 transition-opacity">
                <span class="text-[#D30000]">M</span>arina & <span class="text-[#D30000]">E</span>lévia
            </h1>
            
            <div class="flex-shrink-0">
                <button id="cart-icon-btn" onclick="handleCartClick()" class="w-10 h-10 flex items-center justify-center relative text-gray-900 transition-colors">
                    <i id="cart-icon" class="ph ph-shopping-cart text-2xl transition-colors duration-200"></i>
                    <span id="cart-badge" class="hidden absolute -top-1 -right-1 bg-[#D30000] text-white text-[10px] font-bold w-[18px] h-[18px] flex items-center justify-center rounded-full">
                        0
                    </span>
                </button>
            </div>
            
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-content" class="flex-grow pb-32"></main>

    <!-- Custom Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 bg-[#D30000] text-white px-6 py-4 shadow-xl z-50 flex items-center gap-3 transition-opacity duration-300 opacity-0 pointer-events-none">
        <i class="ph ph-warning text-lg"></i>
        <span id="toast-msg" class="font-light tracking-wide text-sm"></span>
    </div>

    <!-- Solid White Sticky Cart Bar -->
    <div id="cart-pill" class="fixed bottom-0 left-0 w-full bg-white text-gray-900 border-t border-gray-200 shadow-[0_-4px_20px_rgba(0,0,0,0.06)] px-6 md:px-12 py-4 z-40 flex items-center justify-between transition-transform duration-500 translate-y-full">
        <div class="flex items-center gap-3">
            <i class="ph ph-shopping-bag text-2xl text-[#D30000]"></i>
            <span id="cart-pill-text" class="text-sm md:text-base font-medium tracking-wide"></span>
        </div>
        <button onclick="proceedToCheckout()" class="text-xs md:text-sm tracking-widest uppercase font-semibold flex items-center gap-2 text-white bg-[#D30000] px-6 py-3 hover:bg-[#a00000] transition-colors shadow-md">
            Checkout <i class="ph ph-arrow-right text-lg"></i>
        </button>
    </div>

    <script>
        // --- MOCK PRODUCT DATA ---
        const PRODUCTS = [
            { id: 1, name: "Silk Crepe Blouse", price: 145.00, originalPrice: 180.00, rating: 4.9, reviews: 342, description: "A luxurious silk crepe blouse featuring delicate button detailing and a relaxed silhouette. Perfect for transitioning seamlessly from day to evening." },
            { id: 2, name: "Wide-Leg Trousers", price: 180.00, originalPrice: 220.00, rating: 4.8, reviews: 215, description: "High-waisted trousers tailored from premium wool-blend fabric. Features a flawless drape and subtle front pleats for an elegant stride." },
            { id: 3, name: "Cashmere Wrap Coat", price: 395.00, originalPrice: 450.00, rating: 5.0, reviews: 189, description: "An elegant wrap coat spun from pure, soft cashmere. Features a matching self-tie belt and oversized lapels for timeless sophistication." },
            { id: 4, name: "Leather Crossbody", price: 210.00, originalPrice: 260.00, rating: 4.7, reviews: 420, description: "Minimalist structured bag crafted from genuine Italian leather. Includes polished gold-tone hardware and an adjustable strap." },
            { id: 5, name: "Linen Midi Dress", price: 165.00, originalPrice: 195.00, rating: 4.8, reviews: 156, description: "Breathable linen dress perfect for warm, sun-drenched afternoons. Features a subtle V-neckline and a flowing, tiered skirt." },
            { id: 6, name: "Gold Hoop Earrings", price: 85.00, originalPrice: 110.00, rating: 4.9, reviews: 512, description: "Classic, lightweight hoops plated in thick 18k gold vermeil over sterling silver. Designed for comfortable, everyday wear." },
            { id: 7, name: "Suede Pointed Mules", price: 155.00, originalPrice: 190.00, rating: 4.6, reviews: 134, description: "Effortlessly chic mules with a soft suede finish and a sharp pointed toe. Includes a slight stacked heel for all-day comfort." },
            { id: 8, name: "Ribbed Knit Sweater", price: 125.00, originalPrice: 150.00, rating: 4.8, reviews: 298, description: "Cozy ribbed knit sweater with a relaxed, slouchy fit. Spun from a plush cotton-wool blend for unmatched softness." }
        ];

        // --- STATE ---
        let cart = [];
        let currentView = 'home';
        let selectedProductId = null;
        let toastTimeout;
        let finalCustomerEmail = '';

        window.addEventListener('resize', () => { updateCartUI(); });

        // --- CORE FUNCTIONS ---
        function navigate(view, productId = null) {
            currentView = view;
            if (productId) selectedProductId = productId;
            window.scrollTo(0, 0);
            updateCartUI(); 
            render();
        }

        function handleCartClick() {
            const icon = document.getElementById('cart-icon');
            icon.classList.remove('ph');
            icon.classList.add('ph-fill', 'text-[#D30000]');
            setTimeout(() => {
                icon.classList.remove('ph-fill', 'text-[#D30000]');
                icon.classList.add('ph');
                navigate('cart');
            }, 150);
        }

        function addToCart(productId, event) {
            if(event) event.stopPropagation();
            
            const product = PRODUCTS.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCartUI();
            updateAllButtons();
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
            updateAllButtons();
        }

        function updateQuantity(productId, delta, event) {
            if(event) event.stopPropagation();
            const item = cart.find(i => i.id === productId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    updateCartUI();
                    updateAllButtons();
                }
            }
        }

        function updateAllButtons() {
            if (currentView === 'cart') {
                render(); 
                return;
            }
            
            if (currentView === 'product') {
                const btnContainer = document.getElementById(`btn-container-${selectedProductId}`);
                const p = PRODUCTS.find(item => item.id === selectedProductId);
                if (btnContainer && p) {
                    btnContainer.innerHTML = getButtonHTML(p, 'large');
                }
            } else if (currentView === 'home') {
                PRODUCTS.forEach(p => {
                    const btnContainer = document.getElementById(`btn-container-${p.id}`);
                    if (btnContainer) {
                        btnContainer.innerHTML = getButtonHTML(p, 'normal');
                    }
                });
            }
        }

        function getButtonHTML(p, size = 'normal') {
            const inCart = cart.find(item => item.id === p.id);
            const heightClass = size === 'large' ? 'h-[58px] text-sm' : 'h-[42px] text-xs';
            
            if (inCart) {
                return `
                    <div class="mt-4 w-full flex items-center justify-between border border-[#D30000] bg-[#D30000] text-white transition-all duration-300 shadow-md ${heightClass}">
                        <button onclick="updateQuantity(${p.id}, -1, event)" class="w-14 h-full hover:bg-[#a00000] flex items-center justify-center transition-colors">
                            <i class="ph ph-minus font-bold"></i>
                        </button>
                        <span class="font-semibold tracking-widest select-none">${inCart.quantity} IN CART</span>
                        <button onclick="updateQuantity(${p.id}, 1, event)" class="w-14 h-full hover:bg-[#a00000] flex items-center justify-center transition-colors">
                            <i class="ph ph-plus font-bold"></i>
                        </button>
                    </div>
                `;
            } else {
                return `
                    <button onclick="addToCart(${p.id}, event)" class="mt-4 w-full ${heightClass} uppercase tracking-widest font-semibold border border-gray-300 text-gray-700 hover:bg-[#D30000] hover:text-white hover:border-[#D30000] transition-all duration-300">
                        Add to Cart
                    </button>
                `;
            }
        }

        function getCartTotal() {
            return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        }

        function getCartCount() {
            return cart.reduce((sum, item) => sum + item.quantity, 0);
        }

        function updateCartUI() {
            const count = getCartCount();
            const total = getCartTotal();
            
            const badge = document.getElementById('cart-badge');
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }

            const pill = document.getElementById('cart-pill');
            const pillText = document.getElementById('cart-pill-text');
            
            if (count > 0 && currentView !== 'cart' && currentView !== 'checkout' && currentView !== 'thankyou') {
                if (currentView === 'product' && window.innerWidth >= 1024) {
                    pill.classList.add('translate-y-full');
                } else {
                    pillText.textContent = `${count} ITEM${count !== 1 ? 'S' : ''}  |  $${total.toFixed(2)}`;
                    pill.classList.remove('translate-y-full');
                }
            } else {
                pill.classList.add('translate-y-full');
            }
        }

        function proceedToCheckout() {
            navigate('checkout');
        }

        // --- SLIDER LOGIC ---
        function scrollSlider(direction) {
            const slider = document.getElementById('product-slider');
            const width = slider.clientWidth;
            const maxIndex = 2; // 3 images
            
            let currentIndex = Math.round(slider.scrollLeft / width);
            let nextIndex = currentIndex + direction;
            
            // Loop functionality
            if (nextIndex > maxIndex) nextIndex = 0;
            if (nextIndex < 0) nextIndex = maxIndex;
            
            slider.scrollTo({ left: nextIndex * width, behavior: 'smooth' });
        }

        function updateSliderDots(slider) {
            const width = slider.clientWidth;
            if (width === 0) return;
            const index = Math.round(slider.scrollLeft / width);
            document.querySelectorAll('.slider-dot').forEach((dot, i) => {
                dot.classList.toggle('bg-[#D30000]', i === index);
                dot.classList.toggle('bg-gray-300', i !== index);
            });
        }

        // --- GLOBAL LOCATION & SEARCHABLE DROPDOWNS API ---
        
        // Reusable UI builder for searchable dropdowns
        function setupSearchableInput(inputId, dropdownId, loaderId, dataList, onSelectCallback) {
            const input = document.getElementById(inputId);
            const dropdown = document.getElementById(dropdownId);
            if(!input || !dropdown) return;

            const renderList = (items) => {
                dropdown.innerHTML = '';
                if (items.length === 0) {
                    dropdown.innerHTML = '<div class="p-3 text-xs text-gray-500">No results found</div>';
                }
                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'p-3 text-sm hover:bg-gray-50 cursor-pointer border-b border-gray-100 last:border-0 text-gray-800';
                    div.textContent = item.label;
                    div.onclick = () => {
                        input.value = item.label;
                        input.dataset.value = item.value;
                        dropdown.classList.add('hidden');
                        if(onSelectCallback) onSelectCallback(item.value);
                    };
                    dropdown.appendChild(div);
                });
            };

            input.onfocus = () => {
                dropdown.classList.remove('hidden');
                renderList(dataList);
            };
            input.oninput = (e) => {
                dropdown.classList.remove('hidden');
                const val = e.target.value.toLowerCase();
                renderList(dataList.filter(d => d.label.toLowerCase().includes(val)));
            };
            
            document.addEventListener('click', (e) => {
                if(!input.contains(e.target) && !dropdown.contains(e.target)) {
                    dropdown.classList.add('hidden');
                }
            });
        }

        async function setupLocationAPI() {
            const countryInput = document.getElementById('country-input');
            const countryLoader = document.getElementById('country-loader');
            const stateInput = document.getElementById('state-input');
            const stateLoader = document.getElementById('state-loader');
            const cityInput = document.getElementById('city-input');
            const cityLoader = document.getElementById('city-loader');
            const phoneInput = document.getElementById('phoneCode-input');
            const phoneLoader = document.getElementById('phoneCode-loader');

            if(!countryInput) return;

            try {
                countryLoader.classList.remove('hidden');
                phoneLoader.classList.remove('hidden');

                const [countriesRes, codesRes] = await Promise.all([
                    fetch('https://countriesnow.space/api/v0.1/countries'),
                    fetch('https://countriesnow.space/api/v0.1/countries/codes')
                ]);
                const countriesData = await countriesRes.json();
                const codesData = await codesRes.json();

                countryLoader.classList.add('hidden');
                phoneLoader.classList.add('hidden');

                // Map API data to label/value objects
                const countryList = countriesData.data.map(c => ({ label: c.country, value: c.country }));
                const codeList = codesData.data.map(c => ({ label: `${c.name} (${c.dial_code})`, value: c.dial_code }));

                // Default Phone Code to US
                if(phoneInput) {
                    phoneInput.value = "United States (+1)";
                    phoneInput.dataset.value = "+1";
                }

                setupSearchableInput('phoneCode-input', 'phoneCode-dropdown', 'phoneCode-loader', codeList);

                // Setup Country Selection
                setupSearchableInput('country-input', 'country-dropdown', 'country-loader', countryList, async (selectedCountry) => {
                    // Reset Sub-levels
                    stateInput.value = '';
                    stateInput.dataset.value = '';
                    cityInput.value = '';
                    cityInput.dataset.value = '';
                    
                    stateLoader.classList.remove('hidden');
                    try {
                        const res = await fetch('https://countriesnow.space/api/v0.1/countries/states', {
                            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({country: selectedCountry})
                        });
                        const data = await res.json();
                        stateLoader.classList.add('hidden');
                        
                        const stateList = data.data?.states?.map(s => ({ label: s.name, value: s.name })) || [];
                        if (stateList.length === 0) stateInput.placeholder = "N/A (No states)";
                        else stateInput.placeholder = "Search State...";
                        
                        // Setup State Selection
                        setupSearchableInput('state-input', 'state-dropdown', 'state-loader', stateList, async (selectedState) => {
                            cityInput.value = '';
                            cityInput.dataset.value = '';
                            cityLoader.classList.remove('hidden');
                            
                            try {
                                const cRes = await fetch('https://countriesnow.space/api/v0.1/countries/state/cities', {
                                    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({country: selectedCountry, state: selectedState})
                                });
                                const cData = await cRes.json();
                                cityLoader.classList.add('hidden');
                                
                                const cityList = cData.data?.map(c => ({ label: c, value: c })) || [];
                                if (cityList.length === 0) cityInput.placeholder = "N/A (No cities)";
                                else cityInput.placeholder = "Search City...";
                                
                                setupSearchableInput('city-input', 'city-dropdown', 'city-loader', cityList);
                                
                            } catch (e) {
                                cityLoader.classList.add('hidden');
                            }
                        });
                    } catch (e) {
                        stateLoader.classList.add('hidden');
                    }
                });

            } catch (e) {
                console.warn("Location API fallback active.");
                if(countryLoader) countryLoader.classList.add('hidden');
                if(phoneLoader) phoneLoader.classList.add('hidden');
            }
        }

        // --- CHECKOUT FORM LOGIC ---
        function handleDeliverySubmit(event) {
            event.preventDefault();
            const form = document.getElementById('delivery-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            
            // Save email for Thank You page
            finalCustomerEmail = document.getElementById('email').value;

            // Animate Button RIGHTWARDS and fill it entirely
            const btn = document.getElementById('next-btn');
            btn.classList.add('translate-x-12', 'bg-[#D30000]', 'scale-105');
            btn.innerHTML = `<i class="ph ph-spinner animate-spin text-2xl"></i>`;
            
            setTimeout(() => {
                document.getElementById('delivery-step').classList.add('hidden');
                document.getElementById('delivery-back').classList.add('hidden');
                
                document.getElementById('payment-step').classList.remove('hidden');
                document.getElementById('payment-back').classList.remove('hidden');
                initPayPal();
            }, 700);
        }

        function goBackToDelivery() {
            document.getElementById('payment-step').classList.add('hidden');
            document.getElementById('payment-back').classList.add('hidden');
            
            document.getElementById('delivery-step').classList.remove('hidden');
            document.getElementById('delivery-back').classList.remove('hidden');
            
            const btn = document.getElementById('next-btn');
            btn.classList.remove('translate-x-12', 'bg-[#D30000]', 'scale-105');
            btn.innerHTML = `Next <i class="ph ph-arrow-right ml-2 text-lg"></i>`;
        }

        // --- UI UTILITIES ---
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = message;
            
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        // --- RENDERING ---
        function render() {
            const content = document.getElementById('app-content');
            content.innerHTML = '';

            if (currentView === 'home') {
                content.innerHTML = renderHome();
            } else if (currentView === 'product') {
                content.innerHTML = renderProduct();
            } else if (currentView === 'cart') {
                content.innerHTML = renderCart();
            } else if (currentView === 'checkout') {
                content.innerHTML = renderCheckout();
                setupLocationAPI(); 
            } else if (currentView === 'thankyou') {
                content.innerHTML = renderThankYou();
            }
        }

        function renderHome() {
            return `
                <div class="max-w-6xl mx-auto px-4 py-12 fade-in">
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-6 gap-y-16 md:gap-x-8">
                        ${PRODUCTS.map(p => `
                            <div class="group cursor-pointer flex flex-col relative" onclick="navigate('product', ${p.id})">
                                <div class="aspect-[4/5] bg-[#F7F7F7] w-full mb-4 overflow-hidden flex items-center justify-center text-gray-300 transition-colors duration-500 group-hover:bg-[#EFEFEF]">
                                    <span class="opacity-0 group-hover:opacity-100 transition-opacity duration-300 font-light tracking-widest text-xs uppercase text-gray-500">
                                        View Details
                                    </span>
                                </div>
                                
                                <div class="flex flex-col items-center text-center flex-1">
                                    <h3 class="text-sm md:text-base tracking-wider uppercase text-gray-900 mb-1 font-medium">${p.name}</h3>
                                    <div class="flex justify-center items-center text-[#D30000] mb-2 text-xs">
                                        <span class="font-bold mr-1">${p.rating}</span> <i class="ph-fill ph-star"></i>
                                        <span class="text-gray-400 ml-1 font-light">(${p.reviews})</span>
                                    </div>
                                    <p class="text-gray-900 text-sm mb-4 font-medium">
                                        <span class="line-through text-gray-400 font-light mr-2">$${p.originalPrice.toFixed(2)}</span>
                                        $${p.price.toFixed(2)}
                                    </p>
                                    
                                    <div class="w-full mt-auto flex flex-col items-center" onclick="event.stopPropagation()">
                                        <p class="text-[9px] uppercase tracking-widest font-bold text-green-600 mb-1">FREE SHIPPING</p>
                                        <div id="btn-container-${p.id}" class="w-full">
                                            ${getButtonHTML(p, 'normal')}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderProduct() {
            const p = PRODUCTS.find(item => item.id === selectedProductId);
            if (!p) return '';
            
            const starsHTML = Array(5).fill('<i class="ph-fill ph-star text-sm md:text-base"></i>').join('');

            return `
                <div class="max-w-6xl mx-auto px-4 py-12 fade-in">
                    <button onclick="navigate('home')" class="flex items-center text-xs tracking-widest uppercase text-gray-500 hover:text-[#D30000] mb-12 transition-colors group">
                        <i class="ph ph-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i> 
                        Back to Collection
                    </button>
                    
                    <div class="flex flex-col md:flex-row gap-12 lg:gap-16">
                        
                        <!-- Premium CSS Slider -->
                        <div class="flex-1 w-full relative group">
                            <!-- Added snap-always to force 1 image per scroll -->
                            <div id="product-slider" class="flex overflow-x-auto snap-x snap-mandatory hide-scrollbar gap-0 w-full scroll-smooth shadow-sm" onscroll="updateSliderDots(this)">
                                <div class="w-full flex-shrink-0 aspect-[4/5] md:aspect-[3/4] bg-[#F7F7F7] snap-center snap-always flex items-center justify-center relative">
                                   <span class="text-gray-400 font-light tracking-widest uppercase text-sm">Image 1</span>
                                </div>
                                <div class="w-full flex-shrink-0 aspect-[4/5] md:aspect-[3/4] bg-[#EFEFEF] snap-center snap-always flex items-center justify-center relative">
                                   <span class="text-gray-400 font-light tracking-widest uppercase text-sm">Image 2</span>
                                </div>
                                <div class="w-full flex-shrink-0 aspect-[4/5] md:aspect-[3/4] bg-[#F7F7F7] snap-center snap-always flex items-center justify-center relative">
                                   <span class="text-gray-400 font-light tracking-widest uppercase text-sm">Image 3</span>
                                </div>
                            </div>
                            
                            <!-- Slider Controls -->
                            <button onclick="scrollSlider(-1)" class="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/80 backdrop-blur rounded-full flex items-center justify-center text-gray-900 opacity-0 group-hover:opacity-100 transition-opacity shadow-sm z-10">
                                <i class="ph ph-caret-left text-xl"></i>
                            </button>
                            <button onclick="scrollSlider(1)" class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/80 backdrop-blur rounded-full flex items-center justify-center text-gray-900 opacity-0 group-hover:opacity-100 transition-opacity shadow-sm z-10">
                                <i class="ph ph-caret-right text-xl"></i>
                            </button>
                            
                            <!-- Pagination Dots -->
                            <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2 z-10">
                                <div class="slider-dot w-2 h-2 rounded-full bg-[#D30000] transition-colors"></div>
                                <div class="slider-dot w-2 h-2 rounded-full bg-gray-300 transition-colors"></div>

        function renderCart() {

                                    <!-- Searchable State -->

                                        <div class="relative">
                                            <input type="text" id="state-input" required autocomplete="off" class="w-full border-b border-gray-300 py-2 bg-transparent focus:outline-none focus:border-[#D30000] transition-colors text-gray-900 placeholder-gray-300 pr-6" placeholder="Select Country First">

                                            <div id="state-dropdown" class="absolute w-full bg-white border border-gray-100 shadow-xl max-h-48 overflow-y-auto hidden z-50 top-full mt-1"></div>

        function renderThankYou() {
            // Calculate Date 10 days from now
            const deliveryDate = new Date();
            deliveryDate.setDate(deliveryDate.getDate() + 10);
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const formattedDate = deliveryDate.toLocaleDateString(undefined, dateOptions);

            return `
                <div class="max-w-xl mx-auto py-24 px-4 fade-in text-center">
                    <div class="w-20 h-20 bg-[#D30000] text-white rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl">
                        <i class="ph ph-check text-4xl font-bold"></i>
                    </div>
                    <h2 class="text-4xl font-serif tracking-widest uppercase mb-6 text-gray-900">Thank You!</h2>
                    <p class="text-xl text-gray-600 mb-8 font-light">Your elegant order has been placed successfully.</p>
                    
                    <div class="bg-gray-50 p-8 border border-gray-100 text-left mb-10 shadow-sm">
                        <div class="mb-6">
                            <p class="text-xs tracking-widest uppercase text-gray-400 mb-1">Estimated Delivery</p>
                            <p class="text-lg text-gray-900 font-serif">${formattedDate}</p>
                        </div>
                        <div>
                            <p class="text-xs tracking-widest uppercase text-gray-400 mb-1">Confirmation Email</p>
                            <p class="text-base text-gray-900">Your tracking and order details will be mailed to <span class="font-medium text-[#D30000]">${finalCustomerEmail}</span>.</p>
                        </div>
                    </div>

                    <button onclick="navigate('home')" class="text-sm tracking-widest uppercase text-gray-500 hover:text-[#D30000] transition-colors duration-300 border-b border-transparent hover:border-[#D30000] pb-1">
                        Return to Home
                    </button>
                </div>
            `;
        }

        function initPayPal() {
            const container = document.getElementById('paypal-button-container');
            if (!window.paypal) {
                container.innerHTML = '<p class="text-[#D30000] text-sm text-center py-4">Failed to load secure gateway. Please refresh.</p>';
                return;
            }

            container.innerHTML = ''; 
            
            paypal.Buttons({
                style: { color: 'black', shape: 'rect', label: 'pay', height: 55 },
                onClick: function(data, actions) {
                    const form = document.getElementById('delivery-form');
                    if (!form.checkValidity()) {
                        form.reportValidity(); 
                        return actions.reject(); 
                    }
                    
                    // Display "Waiting for payment" overlay
                    document.getElementById('paypal-ui-container').classList.add('hidden');
                    document.getElementById('payment-waiting').classList.remove('hidden');
                    return actions.resolve(); 
                },
                onCancel: function (data) {
                    // Reset UI if customer closes PayPal window without paying
                    document.getElementById('paypal-ui-container').classList.remove('hidden');
                    document.getElementById('payment-waiting').classList.add('hidden');
                },
                createOrder: async function(data, actions) {
                    const productNames = cart.map(item => `${item.name} (Qty: ${item.quantity})`).join(', ');
                    
                    // Capture dataset values from custom searchable dropdowns, fallback to inputs
                    const cInput = document.getElementById('country-input');
                    const sInput = document.getElementById('state-input');
                    const cityIn = document.getElementById('city-input');
                    const codeIn = document.getElementById('phoneCode-input');

                    const orderInfo = {
                        customerName: document.getElementById('customerName').value,
                        email: document.getElementById('email').value,
                        phone: (codeIn?.dataset?.value || "") + " " + document.getElementById('phone').value,
                        address: document.getElementById('address').value,
                        city: cityIn?.value || "",
                        state: sInput?.value || "",
                        zip: document.getElementById('zip').value,
                        country: cInput?.value || "",
                        productName: productNames || "Website Order", 
                        price: "$" + getCartTotal().toFixed(2)
                    };

                    try {
                        const response = await fetch('https://my-store-backend-mauve.vercel.app/api/checkout', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(orderInfo)
                        });

                        if (!response.ok) throw new Error("Server rejected data connection.");
                    } catch (error) {
                        console.error("Vercel Database connection failed:", error);
                        showToast("Failed to connect to secure server. Please check your connection.");
                        
                        // Re-enable UI on fail
                        document.getElementById('paypal-ui-container').classList.remove('hidden');
                        document.getElementById('payment-waiting').classList.add('hidden');
                        throw error; 
                    }

                    return actions.order.create({
                        purchase_units: [{
                            amount: { value: getCartTotal().toFixed(2) }
                        }]
                    });
                },
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        cart = []; 
                        updateCartUI();
                        updateAllButtons();
                        navigate('thankyou');
                    });
                },
                onError: function(err) {
                    console.error("PayPal Error:", err);
                    document.getElementById('paypal-ui-container').classList.remove('hidden');
                    document.getElementById('payment-waiting').classList.add('hidden');
                    showToast("Payment window closed or an error occurred.");
                }
            }).render('#paypal-button-container');
        }

        // Initialize App
        updateCartUI();
        render();
    </script>
